# configuration for official ghcr.io/asgardeo/helm-charts/thunder
configuration:
  server:
    port: 8090
    publicUrl: "https://idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk"
    httpOnly: true
    
  # The crypto settings belong under 'security' in the Asgardeo config model
  security:
    crypto:
      publicKeyPath: "/opt/thunder/repository/resources/security/signing.cert"
      privateKeyPath: "/opt/thunder/repository/resources/security/signing.key"
    
  gateClient:
    hostname: "idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk"
    port: 443
    scheme: "https"
    
  cors:
    allowedOrigins:
      - "https://trader-app-national-single-window-platform.apps.sovecloud1.akaza.lk"
      - "https://oga-fcau-national-single-window-platform.apps.sovecloud1.akaza.lk"
      - "https://oga-ird-national-single-window-platform.apps.sovecloud1.akaza.lk"
      - "https://oga-npqs-national-single-window-platform.apps.sovecloud1.akaza.lk"
      - "https://nsw-api-national-single-window-platform.apps.sovecloud1.akaza.lk"

  database:
    config:
      type: "postgres"
      host: "nsw-db"
      port: 5432
      name: "configdb"
      username: "postgres"
      sslmode: "disable"
      passwordRef:
        name: "nsw-db-credentials"
        key: "password"
    runtime:
      type: "postgres"
      host: "nsw-db"
      port: 5432
      name: "runtimedb"
      username: "postgres"
      sslmode: "disable"
      passwordRef:
        name: "nsw-db-credentials"
        key: "password"
    user:
      type: "postgres"
      host: "nsw-db"
      port: 5432
      name: "userdb"
      username: "postgres"
      sslmode: "disable"
      passwordRef:
        name: "nsw-db-credentials"
        key: "password"

deployment:
  replicaCount: 1
  container:
    port: 8090
    extraEnv:
      - name: THUNDER_SKIP_SECURITY
        value: "true"

# Resources for the main deployment container
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 10m
    memory: 64Mi

global:
  imagePullSecrets:
    - name: ghcr-secret
    
  securityContext:
    runAsNonRoot: true
    enableRunAsUser: true
    runAsUser: 1001570000
    enableRunAsGroup: true
    runAsGroup: 1001570000
    enableFsGroup: true
    fsGroup: 1001570000
    readOnlyRootFilesystem: false # Required for some internal Thunder operations
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL

  volumeMounts:
    - name: thunder-signing-keys-volume
      mountPath: "/opt/thunder/repository/resources/security"
      readOnly: true

  volumes:
    - name: thunder-signing-keys-volume
      secret:
        secretName: "thunder-signing-keys"
        defaultMode: 0444

# Mandatory: Fixes the "failed quota" for the setup job
setup:
  enabled: true
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 10m
      memory: 64Mi

# Mandatory: Fixes the "failed quota" for init containers (init-db, etc)
initResources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

serviceAccount:
  create: true
  name: "thunder-service-account"


ingress:
  enabled: true
  className: "" 
  hostname: "idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk"
  customAnnotations:
    route.openshift.io/termination: edge