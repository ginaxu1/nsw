name: Deploy to Dev

on:
  push:
    branches: [ "main" ]
    # Trigger only when application code or the workflow itself changes
    paths:
      - 'backend/**'
      - 'oga/**'
      - 'portals/**'
      - '.github/workflows/deploy-dev.yml'

env:
  REGISTRY: ghcr.io
  GITOPS_REPO: opennsw/nsw-gitops 

jobs:
  # ---------------------------------------------------------------------------
  # STAGE 1: Build and Push images to GHCR tagged with Git Short SHA.
  # This ensures every commit to main has a unique, deterministic image.
  # ---------------------------------------------------------------------------
  build-and-push-dev:
    name: Build & Push Dev - ${{ matrix.service_name }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: NSW Backend API
            image_name: nsw-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile

          - service_name: NSW DB Migrations
            image_name: nsw-api-migrations
            context: .
            dockerfile: ./backend/migrations.Dockerfile

          - service_name: OGA Backend
            image_name: nsw-oga-backend
            context: ./oga
            dockerfile: ./oga/Dockerfile

          - service_name: Trader Portal
            image_name: nsw-trader-portal
            context: ./portals
            dockerfile: ./portals/apps/trader-app/Dockerfile

          - service_name: OGA Portal
            image_name: nsw-oga-portal
            context: ./portals
            dockerfile: ./portals/apps/oga-app/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Git Short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository owner to lowercase
        id: repo_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # Use deterministic Git Short SHA as the tag (e.g. nsw-backend:a1b2c3d)
          tags: ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ matrix.image_name }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # STAGE 2: Update the GitOps repository with the new image tags.
  # Pushing directly to main triggers immediate ArgoCD synchronization.
  # ---------------------------------------------------------------------------
  update-dev-manifests:
    name: Update ArgoCD (nsw-dev)
    needs: build-and-push-dev
    runs-on: ubuntu-latest
    steps:
      - name: Get Git Short SHA
        id: vars
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update values.yaml for Dev
        run: |
          cd gitops-repo
          SHA="${{ steps.vars.outputs.sha }}"
          
          echo "Updating nsw-dev manifests to use image tag: $SHA"

          # Target both dev app and infra environments in case dbMigrations moves
          MANIFESTS=(
            "envs/nsw-dev/values.yaml"
            "envs/nsw-infra-dev/values.yaml"
          )
          
          UPDATED_FILES=0

          for FILE in "${MANIFESTS[@]}"; do
            if [ -f "$FILE" ]; then
              echo "Processing $FILE..."
              
              # Flat structure update (if the chart doesn't use umbrella keys)
              if [ "$(yq eval "has(\"image\")" "$FILE")" = "true" ]; then
                yq eval ".image.tag = \"$SHA\"" -i "$FILE"
                yq eval ".image.pullPolicy = \"IfNotPresent\"" -i "$FILE"
              fi
              
              # Database migration update
              if [ "$(yq eval "has(\"dbMigrations\")" "$FILE")" = "true" ]; then
                yq eval ".dbMigrations.image.tag = \"$SHA\"" -i "$FILE"
              fi

              # Umbrella chart per-service update
              SERVICES=("nsw-api" "nsw-oga-backend" "nsw-trader-portal" "nsw-oga-portal")
              for SVC in "${SERVICES[@]}"; do
                if [ "$(yq eval "has(\"$SVC\")" "$FILE")" = "true" ]; then
                  yq eval ".$SVC.image.tag = \"$SHA\"" -i "$FILE"
                  yq eval ".$SVC.image.pullPolicy = \"IfNotPresent\"" -i "$FILE"
                fi
              done
              
              echo "✅ Successfully updated $FILE"
              UPDATED_FILES=$((UPDATED_FILES + 1))
            else
              echo "ℹ️ Note: $FILE not found, skipping."
            fi
          done

          # Fail the job if neither dev file was found
          if [ "$UPDATED_FILES" -eq 0 ]; then
            echo "❌ Error: No dev environment values.yaml files found in the GitOps repository!"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "chore(dev): auto-deploy commit ${SHA} to nsw-dev"
            git push origin main
          else
            echo "No changes to commit. Manifests are already up to date."
          fi