name: Zero-Touch GitOps Release
# Triggered by a published GitHub Release (created by release.yaml).
# This workflow does NOT rebuild images — it reads the release-digests.json
# asset attached by release.yaml to verify all images exist in GHCR, then
# updates the ArgoCD Helm manifests in the GitOps repository.
#
# Chain:
#   push tag → release.yaml builds images → creates GitHub Release
#           → this workflow triggers → verifies digests → updates manifests
#           → ArgoCD detects changes → deploys to dev/staging

on:
  release:
    types: [published]
  # TODO: Remove workflow_dispatch trigger once this workflow is validated and the PR is approved.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 1.5.0 — no leading v)'
        required: true
        type: string
      release_tag:
        description: 'GitHub Release tag to fetch digests from (e.g., v1.5.0)'
        required: true
        type: string

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  GITOPS_REPO: opennsw/nsw-gitops

jobs:
  # ---------------------------------------------------------------------------
  # Verify all images exist in GHCR using the digests from release-digests.json,
  # then update ArgoCD Helm values files in the GitOps repository.
  # ---------------------------------------------------------------------------
  update-gitops-state:
    name: Verify Digests & Update ArgoCD Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
          else
            VERSION_TAG="${{ github.event.release.tag_name }}"
            VERSION="${VERSION_TAG#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying version: $VERSION"

      - name: Convert repository owner to lowercase
        id: repo_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # Download the release-digests.json that release.yaml attached to the GitHub Release.
      # For workflow_dispatch (manual testing), the caller supplies the release tag explicitly.
      - name: Download release-digests.json from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          else
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          fi

          echo "Fetching release-digests.json from release: $RELEASE_TAG"
          gh release download "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --pattern "release-digests.json" \
            --output release-digests.json

          echo "Downloaded release-digests.json:"
          cat release-digests.json

      # Verify every expected image digest is reachable in GHCR before touching
      # any manifests. This acts as a gate — if an image is missing or the digest
      # doesn't match, the workflow fails here rather than deploying a broken state.
      - name: Verify image digests in GHCR
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OWNER="${{ steps.repo_owner.outputs.owner }}"
          FAILED=0

          IMAGES=(
            "nsw-backend"
            "nsw-api-migrations"
            "nsw-oga-backend"
            "nsw-trader-portal"
            "nsw-oga-portal"
          )

          for IMAGE in "${IMAGES[@]}"; do
            EXPECTED_DIGEST=$(jq -r ".\"${IMAGE}\"" release-digests.json)

            if [ "$EXPECTED_DIGEST" == "null" ] || [ -z "$EXPECTED_DIGEST" ]; then
              echo "❌ MISSING digest for ${IMAGE} in release-digests.json"
              FAILED=1
              continue
            fi

            IMAGE_REF="${{ env.REGISTRY }}/${OWNER}/${IMAGE}@${EXPECTED_DIGEST}"
            echo "Verifying: ${IMAGE_REF}"

            # docker manifest inspect confirms the digest exists in the registry.
            if docker manifest inspect "$IMAGE_REF" > /dev/null 2>&1; then
              echo "✅ ${IMAGE}: digest verified (${EXPECTED_DIGEST})"
            else
              echo "❌ ${IMAGE}: digest NOT found in GHCR (${EXPECTED_DIGEST})"
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "One or more image digests could not be verified. Aborting manifest update."
            exit 1
          fi

          echo ""
          echo "All image digests verified. Proceeding to manifest update."

      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update Helm Manifests
        run: |
          cd gitops-repo
          VERSION="${{ steps.version.outputs.version }}"
          echo "Updating all DEV and STAGING manifests to version: $VERSION"

          # Dynamically find all values.yaml files in dev/staging environments
          # Pattern: any values.yaml file inside a 'dev' or 'staging' directory under 'apps/'
          readarray -t MANIFESTS < <(find apps -type f -name "values.yaml" | grep -E "/(dev|staging)/")

          if [ ${#MANIFESTS[@]} -eq 0 ]; then
            echo "❌ No manifest files found to update!"
            exit 1
          fi

          for FILE in "${MANIFESTS[@]}"; do
            yq eval ".image.tag = \"$VERSION\"" -i "$FILE"

            # Special case: nsw-api manifests also carry a separate migration image tag.
            if [[ "$FILE" == *"nsw-api"* ]]; then
              yq eval ".dbMigrations.image.tag = \"$VERSION\"" -i "$FILE"
            fi

            echo "✅ Updated $FILE"
          done

      - name: Create Pull Request in GitOps Repo
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          cd gitops-repo
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH_NAME="deploy/v${VERSION}"
          
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if [[ -n "$(git status --porcelain)" ]]; then
            # Check if branch already exists and delete if so (to allow re-runs)
            if git ls-remote --exit-code --heads origin "$BRANCH_NAME"; then
               git push origin --delete "$BRANCH_NAME"
            fi

            git checkout -b "$BRANCH_NAME"
            git commit -m "chore(cd): update dev/staging tags to v${VERSION}"
            git push origin "$BRANCH_NAME"
            
            echo "Creating Pull Request..."
            gh pr create \
              --title "🚀 Deploy v${VERSION} to Dev/Staging" \
              --body "This PR updates the Helm manifests for all microservices to version \`v${VERSION}\`. 
              
              **Deployment Summary:**
              - **Version:** \`v${VERSION}\`
              - **Source:** [Release v${VERSION}](https://github.com/${{ github.repository }}/releases/tag/v${VERSION})
              - **Triggered By:** @${{ github.actor }}
              
              Please review and merge to trigger ArgoCD synchronization." \
              --base main \
              --head "$BRANCH_NAME" \
              --repo "${{ env.GITOPS_REPO }}"
          else
            echo "No changes detected. Manifests are already at version ${VERSION}."
          fi

      - name: Generate deployment summary
        if: always()
        run: |
          echo "## GitOps Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **GitOps Repo**: ${{ env.GITOPS_REPO }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger**: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Environments Updated" >> "$GITHUB_STEP_SUMMARY"
          echo "- dev" >> "$GITHUB_STEP_SUMMARY"
          echo "- staging" >> "$GITHUB_STEP_SUMMARY"
