# 1. Image and Resource Configuration
# This block fixes the "nil pointer evaluating interface {}.registry" error
deployment:
  replicaCount: 1
  image:
    registry: ghcr.io/asgardeo
    repository: thunder
    tag: latest
    pullPolicy: Always
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi
  # OpenShift Compliance: Disable fixed UIDs to allow random UID assignment
  securityContext:
    enableRunAsUser: false
    enableRunAsGroup: false
    enableFsGroup: false
    readOnlyRootFilesystem: false # Required if SQLite or local logs are used
  initResources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# 2. Thunder Application Configuration
configuration:
  server:
    publicURL: "https://idp-thunder-national-single-window-platform.apps.sovecloud.akaza.lk"
  gateClient:
    hostname: "idp-thunder-national-single-window-platform.apps.sovecloud.akaza.lk"
  
  # Database Configuration (Postgres for NSW)
  database:
    config:
      type: postgres
      host: "nsw-db"
      name: "configdb"
      username: "user123"
      password: "1234"
    runtime:
      type: postgres
      host: "nsw-db"
      name: "runtimedb"
      username: "asgthunder"
      passwordRef:
        name: "thunder-auth-secret"
        key: "adminPassword"
    user:
      type: postgres
      host: "nsw-db"
      name: "userdb"
      username: "asgthunder"
      passwordRef:
        name: "thunder-auth-secret"
        key: "adminPassword"

# 3. Authentication Bootstrap Settings
auth:
  adminUsername: "admin"
  existingSecret: "thunder-auth-secret"
  secretKey: "adminPassword"

# 4. Networking (Service & Ingress/Route)
service:
  port: 8090

ingress:
  enabled: true
  className: "" # OpenShift ignores nginx class usually
  hostname: "idp-thunder-national-single-window-platform.apps.sovecloud.akaza.lk"
  commonAnnotations:
    route.openshift.io/termination: passthrough

# 5. Setup Job Configuration
setup:
  enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi