apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "thunder.fullname" . }}
spec:
  replicas: {{ .Values.deployment.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "thunder.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "thunder.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName | default "thunder-service-account" }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        # OpenShift: These will only apply once the Admin grants 'anyuid'
        {{- if .Values.deployment.securityContext.enabled }}
        runAsUser: {{ .Values.deployment.securityContext.runAsUser | default 1000 }}
        runAsGroup: {{ .Values.deployment.securityContext.runAsGroup | default 1000 }}
        fsGroup: {{ .Values.deployment.securityContext.fsGroup | default 1000 }}
        {{- end }}
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-security
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["sh", "-c", "cp -rv /opt/thunder/repository/resources/security/* /security/ && chmod -R 777 /security/"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: security-keys
              mountPath: /security
          resources:
            {{- toYaml .Values.initResources | nindent 12 }} # KEY FIX
        - name: init-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["sh", "-c", "cp -rv /opt/thunder/repository/database/* /db/ && chmod -R 777 /db/"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: db-data
              mountPath: /db
          resources:
            {{- toYaml .Values.initResources | nindent 12 }} # KEY FIX
      containers:
        - name: thunder
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8090
              protocol: TCP
              name: https
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: THUNDER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | default "thunder-auth-secret" }}
                  key: {{ .Values.auth.secretKey | default "adminPassword" }}
            - name: DB_CONFIG_HOST
              value: {{ .Values.configuration.database.config.host | quote }}
            - name: DB_CONFIG_NAME
              value: {{ .Values.configuration.database.config.name | quote }}
            - name: DB_CONFIG_USER
              value: {{ .Values.configuration.database.config.username | quote }}
            - name: DB_RUNTIME_HOST
              value: {{ .Values.configuration.database.runtime.host | quote }}
            - name: DB_RUNTIME_NAME
              value: {{ .Values.configuration.database.runtime.name | quote }}
            - name: DB_RUNTIME_USER
              value: {{ .Values.configuration.database.runtime.username | quote }}
          volumeMounts:
            - name: db-data
              mountPath: /opt/thunder/repository/database
            - name: security-keys
              mountPath: /opt/thunder/repository/resources/security
          resources:
            {{- toYaml .Values.deployment.resources | nindent 12 }}
      volumes:
        - name: db-data
          emptyDir: {}
        - name: security-keys
          emptyDir: {}