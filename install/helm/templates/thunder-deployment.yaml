apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "thunder.fullname" . }}
spec:
  replicas: {{ .Values.deployment.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "thunder.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "thunder.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName | default "thunder-service-account" }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      securityContext:
        {{- if .Values.deployment.securityContext.enabled }}
        runAsUser: {{ .Values.deployment.securityContext.runAsUser }}
        runAsGroup: {{ .Values.deployment.securityContext.runAsGroup }}
        fsGroup: {{ .Values.deployment.securityContext.fsGroup }}
        runAsNonRoot: {{ .Values.deployment.securityContext.runAsNonRoot | default true }}
        {{- end }}
        seccompProfile:
          type: {{ .Values.deployment.securityContext.seccompProfile.type | default "RuntimeDefault" }}
          
      initContainers:
        - name: init-security
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["sh", "-c", "mkdir -p /security && cp -rv /app/repository/resources/security/. /security/ || true"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
          volumeMounts:
            - name: security-keys
              mountPath: /security
          resources:
            {{- toYaml .Values.initResources | nindent 12 }}
            
        - name: init-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["sh", "-c", "mkdir -p /db && cp -rv /app/repository/database/. /db/ || true"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
          volumeMounts:
            - name: db-data
              mountPath: /db
          resources:
            {{- toYaml .Values.initResources | nindent 12 }}
            
      containers:
        - name: thunder
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          ports:
            - containerPort: 8081
              protocol: TCP
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: OGA_DB_DRIVER
              value: "postgres"
            - name: OGA_DB_HOST
              value: {{ .Values.configuration.database.config.host | quote }}
            - name: OGA_DB_NAME
              value: {{ .Values.configuration.database.config.name | quote }}
            - name: OGA_DB_USER
              value: {{ .Values.configuration.database.config.username | quote }}
            - name: OGA_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "nsw-db-credentials"
                  key: "password"
            - name: OGA_PORT
              value: "8081"
            # NSW Specific Env
            - name: THUNDER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | default "thunder-auth-secret" }}
                  key: {{ .Values.auth.secretKey | default "adminPassword" }}
          volumeMounts:
            # Aligned paths with Dockerfile WORKDIR /app
            - name: db-data
              mountPath: /app/repository/database
            - name: security-keys
              mountPath: /app/repository/resources/security
          resources:
            {{- toYaml .Values.deployment.resources | nindent 12 }}
            
      volumes:
        - name: db-data
          emptyDir: {}
        - name: security-keys
          emptyDir: {}