apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "thunder.fullname" . }}-setup
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      labels:
        {{- include "thunder.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName | default "thunder-service-account" }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: setup
          # FIX: Using the corrected image mapping from your values
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for Thunder Service at {{ include "thunder.fullname" . }}:8090..."
              # Increased sleep to 5s to reduce log noise while waiting for Admin SCC fix
              until wget --no-check-certificate --spider -q https://{{ include "thunder.fullname" . }}:8090/console; do
                echo "Thunder Service not reachable yet. Retrying..."
                sleep 5
              done
              
              echo "Thunder Service is UP. Starting bootstrap..."
              export THUNDER_ADMIN_USERNAME="{{ .Values.auth.adminUsername }}"
              export THUNDER_ADMIN_PASSWORD="$THUNDER_ADMIN_PASSWORD"
              export THUNDER_API_BASE="https://{{ include "thunder.fullname" . }}:8090"
              export SKIP_SSL_VERIFICATION="true"

              # Run the bootstrap scripts provided by the Asgardeo image
              /opt/thunder/bootstrap/01-default-resources.sh
              /opt/thunder/bootstrap/02-sample-resources.sh
              echo "Bootstrap successful."
          env:
            - name: THUNDER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | default "thunder-auth-secret" }}
                  key: {{ .Values.auth.secretKey | default "adminPassword" }}
          resources:
            {{- toYaml .Values.setup.resources | nindent 12 }}
      restartPolicy: OnFailure
  # Allow it to retry if the service blips during startup
  backoffLimit: 10