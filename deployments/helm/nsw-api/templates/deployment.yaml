apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nsw-api.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "nsw-api.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "nsw-api.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "nsw-api.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if .Values.migrations.enabled }}
      volumes:
        - name: migration-scripts
          configMap:
            name: {{ include "nsw-api.fullname" . }}-db-migrations
            defaultMode: 0755
        - name: migration-sql
          emptyDir: {}
      initContainers:
        # Step 1: Copy SQL files from the nsw-api image to a shared volume
        - name: copy-migrations
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c", "MIG_DIR=$(find /app -name 001_initial_schema.sql | head -n 1 | xargs dirname); if [ -z \"$MIG_DIR\" ]; then echo \"FATAL: migrations not found\"; exit 1; fi; cp -r $MIG_DIR/. /migrations/"]
          volumeMounts:
            - name: migration-sql
              mountPath: /migrations
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
        # Step 2: Run migrations via psql
        - name: run-migrations
          image: "{{ .Values.migrations.image.repository }}:{{ .Values.migrations.image.tag }}"
          command: ["sh", "/scripts/run-migrations.sh"]
          env:
            - name: PGHOST
              value: {{ .Values.config.database.host | quote }}
            - name: PGPORT
              value: {{ .Values.config.database.port | quote }}
            - name: PGUSER
              value: {{ .Values.config.database.username | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: nsw-db-credentials
                  key: password
            - name: PGDATABASE
              value: {{ .Values.config.database.name | quote }}
            - name: NPQS_OGA_SUBMISSION_URL
              value: {{ .Values.migrations.ogaSubmissionUrls.npqs | quote }}
            - name: FCAU_OGA_SUBMISSION_URL
              value: {{ .Values.migrations.ogaSubmissionUrls.fcau | quote }}
            - name: PRECONSIGNMENT_OGA_SUBMISSION_URL
              value: {{ .Values.migrations.ogaSubmissionUrls.preconsignment | quote }}
          volumeMounts:
            - name: migration-scripts
              mountPath: /scripts
            - name: migration-sql
              mountPath: /migrations
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.server.port }}
              protocol: TCP
          env:
            # --- Server ---
            - name: SERVER_PORT
              value: {{ .Values.config.server.port | quote }}
            - name: SERVER_DEBUG
              value: {{ .Values.config.server.debug | quote }}
            - name: SERVER_LOG_LEVEL
              value: {{ .Values.config.server.logLevel | quote }}

            # --- Database ---
            - name: DB_HOST
              value: {{ .Values.config.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.config.database.port | quote }}
            - name: DB_USERNAME
              value: {{ .Values.config.database.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nsw-db-credentials
                  key: password
            - name: DB_NAME
              value: {{ .Values.config.database.name | quote }}
            - name: DB_SSLMODE
              value: {{ .Values.config.database.sslMode | quote }}

            # --- Auth / OIDC ---
            - name: AUTH_JWKS_URL
              value: {{ .Values.config.auth.jwksUrl | quote }}
            - name: AUTH_ISSUER
              value: {{ .Values.config.auth.issuer | quote }}
            - name: AUTH_AUDIENCE
              value: {{ .Values.config.auth.audience | quote }}
            - name: AUTH_CLIENT_ID
              value: {{ .Values.config.auth.clientId | quote }}
            - name: AUTH_JWKS_INSECURE_SKIP_VERIFY
              value: {{ .Values.config.auth.insecureSkipTlsVerify | quote }}

            # --- Service URL & CORS ---
            - name: SERVICE_URL
              value: {{ .Values.config.serviceUrl | quote }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ join "," .Values.config.cors.allowedOrigins | quote }}

            # --- Storage ---
            - name: STORAGE_TYPE
              value: {{ .Values.config.storage.type | quote }}
            {{- if eq .Values.config.storage.type "local" }}
            - name: STORAGE_LOCAL_BASE_DIR
              value: {{ .Values.config.storage.localBaseDir | quote }}
            {{- end }}
            {{- if eq .Values.config.storage.type "s3" }}
            - name: STORAGE_S3_ENDPOINT
              value: {{ .Values.config.storage.s3Endpoint | quote }}
            - name: STORAGE_S3_BUCKET
              value: {{ .Values.config.storage.s3Bucket | quote }}
            - name: STORAGE_S3_REGION
              value: {{ .Values.config.storage.s3Region | quote }}
            - name: STORAGE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nsw-s3-credentials
                  key: accessKey
            - name: STORAGE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nsw-s3-credentials
                  key: secretKey
            - name: STORAGE_S3_USE_SSL
              value: {{ .Values.config.storage.s3UseSsl | quote }}
            {{- if .Values.config.storage.s3PublicUrl }}
            - name: STORAGE_S3_PUBLIC_URL
              value: {{ .Values.config.storage.s3PublicUrl | quote }}
            {{- end }}
            {{- end }}

          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
