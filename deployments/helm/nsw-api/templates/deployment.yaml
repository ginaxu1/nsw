apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nsw-api.fullname" . }}
  labels:
    {{- include "nsw-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nsw-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nsw-api.selectorLabels" . | nindent 8 }}
    spec:
      # Pod level security
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 0
        fsGroup: 0
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Container level security (Standard for Production)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.config.server.port }}
              protocol: TCP
          volumeMounts:
            - name: uploads-volume
              mountPath: /app/bucket
            - name: services-config
              mountPath: /app/configs
          env:
            # --- Server ---
            - name: SERVER_PORT
              value: {{ .Values.config.server.port | quote }}
            - name: SERVER_DEBUG
              value: {{ .Values.config.server.debug | quote }}
            - name: SERVER_LOG_LEVEL
              value: {{ .Values.config.server.logLevel | quote }}

            # --- Database ---
            - name: DB_HOST
              value: {{ .Values.config.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.config.database.port | quote }}
            - name: DB_USERNAME
              value: {{ .Values.config.database.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nsw-db-credentials
                  key: password
            - name: DB_NAME
              value: {{ .Values.config.database.name | quote }}
            - name: DB_SSLMODE
              value: {{ .Values.config.database.sslMode | quote }}

            # --- Auth / OIDC ---
            - name: AUTH_JWKS_URL
              value: {{ .Values.config.auth.jwksUrl | quote }}
            - name: AUTH_ISSUER
              value: {{ .Values.config.auth.issuer | quote }}
            - name: AUTH_AUDIENCE
              value: {{ .Values.config.auth.audience | quote }}
            - name: AUTH_CLIENT_ID
              value: {{ .Values.config.auth.clientId | quote }}
            - name: AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: idp-client-secret
                  key: clientSecret
            - name: AUTH_JWKS_INSECURE_SKIP_VERIFY
              value: {{ .Values.config.auth.insecureSkipTlsVerify | quote }}

            # --- Service URL & CORS ---
            - name: SERVICE_URL
              value: {{ .Values.config.serviceUrl | quote }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ join "," .Values.config.cors.allowedOrigins | quote }}
            - name: SERVICES_CONFIG_PATH
              value: "/app/configs/services.json"

            # --- Storage ---
            - name: STORAGE_TYPE
              value: {{ .Values.config.storage.type | quote }}
            {{- if eq .Values.config.storage.type "local" }}
            - name: STORAGE_LOCAL_BASE_DIR
              value: {{ .Values.config.storage.localBaseDir | quote }}
            {{- end }}
            {{- if eq .Values.config.storage.type "s3" }}
            - name: STORAGE_S3_ENDPOINT
              value: {{ .Values.config.storage.s3Endpoint | quote }}
            - name: STORAGE_S3_BUCKET
              value: {{ .Values.config.storage.s3Bucket | quote }}
            - name: STORAGE_S3_REGION
              value: {{ .Values.config.storage.s3Region | quote }}
            - name: STORAGE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nsw-s3-credentials
                  key: accessKey
            - name: STORAGE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nsw-s3-credentials
                  key: secretKey
            - name: STORAGE_S3_USE_SSL
              value: {{ .Values.config.storage.s3UseSsl | quote }}
            {{- end }}

            # --- Temporal ---
            - name: TEMPORAL_HOST
              value: {{ .Values.service.temporalHost | quote }}
            - name: USE_WORKFLOW_MANAGER_V2
              value: {{ .Values.service.useWorkflowManagerV2 | quote }}
            - name: TEMPORAL_MTLS_CERT
              valueFrom:
                secretKeyRef:
                  name: temporal-certs
                  key: cert
            - name: TEMPORAL_MTLS_KEY
              valueFrom:
                secretKeyRef:
                  name: temporal-certs
                  key: key

          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: services-config
          configMap:
            name: {{ include "nsw-api.fullname" . }}-services
        - name: uploads-volume
          emptyDir: {}