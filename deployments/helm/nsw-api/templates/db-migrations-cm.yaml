apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nsw-api.fullname" . }}-db-migrations
  labels:
    {{- include "nsw-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0" 
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  run-migrations.sh: |
    #!/bin/sh
    set -e

    echo "=== NSW DB Migration Runner ==="
    echo "Host: $PGHOST | DB: $PGDATABASE"

    # All idempotent migration files in dependency order.
    MIGRATIONS="
      001_initial_schema.sql
      001_insert_seed_hscodes.sql
    001_insert_seed_form_templates.sql
      001_insert_seed_workflow_node_templates.sql
      001_insert_seed_workflow_templates.sql
      001_insert_seed_workflow_hscode_map.sql
      001_insert_seed_pre_consignment_template.sql
      001_insert_cha_entity.sql
      002_workflow_table.sql
      002_workflow_tem_v2.sql
      003_add_payment_task_type.sql
      004_reseed_trader_preconsignments.sql
      005_add_workflow_type.sql
    "

    for FILE in $MIGRATIONS; do
      FILEPATH="/migrations/$FILE"
      if [ -f "$FILEPATH" ]; then
        echo "-> Executing: $FILE"
        psql \
          -v NPQS_OGA_SUBMISSION_URL="$NPQS_OGA_SUBMISSION_URL" \
          -v FCAU_OGA_SUBMISSION_URL="$FCAU_OGA_SUBMISSION_URL" \
          -v PRECONSIGNMENT_OGA_SUBMISSION_URL="$PRECONSIGNMENT_OGA_SUBMISSION_URL" \
          -f "$FILEPATH" || echo "Warning: $FILE encountered errors, continuing..."
      else
        echo "!! WARNING: $FILE not found, skipping."
      fi
    done

    echo "=== Migrations completed ==="

  {{- range $path, $_ :=  .Files.Glob "sql/*.sql" }}
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
  {{- end }}
