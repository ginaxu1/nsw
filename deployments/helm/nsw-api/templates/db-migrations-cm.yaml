{{- if .Values.dbMigrations.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nsw-api.fullname" . }}-db-migrations
  labels:
    {{- include "nsw-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
data:
  init.sql: |
    -- Base Migration Script
    -- Ensure extensions are enabled
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- Create migrations metadata table
    CREATE TABLE IF NOT EXISTS schema_migrations (
        version BIGINT PRIMARY KEY,
        applied_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Minimal set of tables for idp/auth if not using thunder's seeder
    -- Placeholder for the actual app schema
    SELECT 1;
{{- end }}
