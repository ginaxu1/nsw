{{- if .Values.dbMigrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nsw-api.fullname" . }}-migration
  labels:
    {{- include "nsw-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.dbMigrations.backoffLimit | default 3 }}
  template:
    spec:
      containers:
        - name: psql-migration
          image: {{ .Values.dbMigrations.image | default "registry.redhat.io/rhel8/postgresql-12:latest" }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dbMigrations.secretName | default (include "nsw-api.fullname" .) }}
                  key: {{ .Values.dbMigrations.secretKey | default "db-password" }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting migrations..."
              psql -h {{ .Values.dbMigrations.host | default "nsw-db" }} \
                   -U {{ .Values.dbMigrations.user | default "postgres" }} \
                   -d {{ .Values.dbMigrations.database | default "nsw" }} \
                   -f /migrations/init.sql
          volumeMounts:
            - name: migration-scripts
              mountPath: /migrations
      restartPolicy: OnFailure
      volumes:
        - name: migration-scripts
          configMap:
            name: {{ include "nsw-api.fullname" . }}-db-migrations
{{- end }}
