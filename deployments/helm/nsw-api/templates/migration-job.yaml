apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nsw-api.fullname" . }}-db-migration-{{ .Release.Revision }}
  labels:
    {{- include "nsw-api.labels" . | nindent 4 }}
  annotations:
    # This is the "Magic": Run before the app upgrades
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    # Delete the job automatically after success to free up Service slots/resources
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: {{ include "nsw-api.fullname" . }}-db-migration
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      containers:
        - name: run-migrations
          image: {{ .Values.migrations.image.repository }}{{ if .Values.migrations.image.tag }}:{{ .Values.migrations.image.tag }}{{ end }}
          command: ["sh", "/scripts/run-migrations.sh"]
          env:
            - name: PGHOST
              value: {{ .Values.config.database.host | quote }}
            - name: PGPORT
              value: {{ .Values.config.database.port | quote }}
            - name: PGUSER
              value: {{ .Values.config.database.username | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: nsw-db-credentials
                  key: password
            - name: PGDATABASE
              value: {{ .Values.config.database.name | quote }}
            # Pass portal URLs for dynamic SQL injection if needed
            - name: NPQS_OGA_SUBMISSION_URL
              value: {{ .Values.migrations.ogaSubmissionUrls.npqs | quote }}
            - name: FCAU_OGA_SUBMISSION_URL
              value: {{ .Values.migrations.ogaSubmissionUrls.fcau | quote }}
            - name: PRECONSIGNMENT_OGA_SUBMISSION_URL
              value: {{ .Values.migrations.ogaSubmissionUrls.preconsignment | quote }}
          volumeMounts:
            - name: migration-scripts
              mountPath: /scripts
            - name: migration-sql
              mountPath: /migrations
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: migration-scripts
          configMap:
            name: {{ include "nsw-api.fullname" . }}-db-migrations
            defaultMode: 0755
        - name: migration-sql
          configMap:
            name: {{ include "nsw-api.fullname" . }}-db-migrations
