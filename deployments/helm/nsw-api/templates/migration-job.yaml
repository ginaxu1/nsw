{{- if .Values.dbMigrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nsw-api.fullname" . }}-migration-{{ .Values.dbMigrations.image.tag | default .Values.image.tag | truncate 7 }}
  labels:
    {{- include "nsw-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: {{ include "nsw-api.fullname" . }}-migration
      labels:
        {{- include "nsw-api.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "ghcr.io/opennsw/nsw-api-migrations:{{ .Values.dbMigrations.image.tag | default .Values.image.tag }}"
          imagePullPolicy: {{ .Values.dbMigrations.image.pullPolicy | default .Values.image.pullPolicy }}
          command: ["/usr/local/bin/migrate"]
          args:
            - "-path"
            - "/migrations"
            - "-database"
            - "postgres://{{ .Values.config.database.username }}:$(DB_PASSWORD)@{{ .Values.config.database.host }}:{{ .Values.config.database.port }}/{{ .Values.dbMigrations.database | default .Values.config.database.name }}?sslmode={{ .Values.config.database.sslMode }}"
            - "up"
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.database.credentialsSecretName | default "nsw-db-credentials" }}
                  key: password
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
{{- end }}