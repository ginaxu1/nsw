# Default values for nsw-api.
global:
  namespace: "national-single-window-platform"
  clusterDomain: "apps.sovecloud1.akaza.lk"

fullnameOverride: ""
replicaCount: 1

image:
  repository: ghcr.io/opennsw/nsw-api
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets:
  - name: ghcr-secret

podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  temporalHost: temporal-server:7233
  temporalNamespace: default
  services: []

config:
  server:
    port: 8080
    debug: false
    logLevel: "info"

  database:
    host: "nsw-db"
    port: 5432
    name: "nsw_db"
    username: "postgres"
    credentialsSecretName: "nsw-db-credentials"
    sslMode: "disable"
    maxIdleConns: 10
    maxOpenConns: 100
    maxConnLifetimeSeconds: 3600

  auth:
    # Use the internal service name and port 8090
    jwksUrl: "http://idp-thunder-service.national-single-window-platform.svc.cluster.local:8090/oauth2/jwks"
    issuer: "https://idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk"
    audience: "TRADER_PORTAL_APP"
    clientId: "TRADER_PORTAL_APP"
    # Set to true if the IDP is using a self-signed cert internally (common in GovCloud)
    insecureSkipTlsVerify: false

  serviceUrl: "https://nsw-api-national-single-window-platform.apps.sovecloud1.akaza.lk/api/v1"
  internalServiceUrl: "http://nsw-api.national-single-window-platform.svc.cluster.local"

  # servicePrefix is the Helm release name prefix used to construct internal OGA backend service URLs.
  # It MUST match the release name used when deploying the OGA backend charts.
  # Example: release "dev-nsw-api" → servicePrefix "dev" → resolves to "dev-oga-fcau-backend"
  servicePrefix: "dev"

  cors:
    allowedOrigins: "https://trader-app-national-single-window-platform.apps.sovecloud1.akaza.lk,https://oga-fcau-national-single-window-platform.apps.sovecloud1.akaza.lk,https://oga-ird-national-single-window-platform.apps.sovecloud1.akaza.lk,https://oga-npqs-national-single-window-platform.apps.sovecloud1.akaza.lk"
    allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
    allowedHeaders: "Content-Type,Authorization"
    allowCredentials: true
    maxAge: 3600

  storage:
    type: "local"
    localBaseDir: "/tmp/bucket"
    localPublicUrl: "/api/v1/uploads"
    # S3 config — only used when storage.type is "s3"
    s3Endpoint: ""
    s3Bucket: "nsw-uploads"
    s3Region: "us-east-1"
    s3UseSsl: true
    s3PublicUrl: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

route:
  enabled: false
  tls:
    enabled: false
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: nsw-api
          topologyKey: kubernetes.io/hostname

dbMigrations:
  enabled: true
  image:
    repository: ghcr.io/opennsw/nsw-api-migrations
    tag: latest
    pullPolicy: IfNotPresent
  backoffLimit: 3
  host: nsw-db
  port: 5432
  database: nsw_db
  secretName: nsw-db-credentials
  secretKey: password
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  user: postgres
