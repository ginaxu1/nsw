# Default values for nsw-api.

fullnameOverride: "nsw-api"
replicaCount: 1

image:
  repository: ghcr.io/opennsw/nsw-api
  pullPolicy: Always
  tag: latest

imagePullSecrets:
  - name: ghcr-secret

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001570000
  runAsGroup: 1001570000
  fsGroup: 1001570000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  useWorkflowManagerV2: true
  temporalHost: "temporal-server:7233"

config:
  server:
    port: 8080
    debug: false
    logLevel: "info"

  database:
    host: "nsw-db"
    port: 5432
    name: "nsw_db"
    username: "postgres"
    # password comes from Secret: nsw-db-credentials.password
    sslMode: "disable"

  auth:
    # Use the internal service name and port 8090
    jwksUrl: "http://idp-thunder-service.national-single-window-platform.svc.cluster.local:8090/oauth2/jwks"
    issuer: "https://idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk"
    audience: "TRADER_PORTAL_APP"
    clientId: "TRADER_PORTAL_APP"
    # Set to true if the IDP is using a self-signed cert internally (common in GovCloud)
    insecureSkipTlsVerify: true

  serviceUrl: "https://nsw-api-national-single-window-platform.apps.sovecloud1.akaza.lk"
  internalServiceUrl: "http://nsw-api.national-single-window-platform.svc.cluster.local"

  cors:
    allowedOrigins:
      - "https://trader-app-national-single-window-platform.apps.sovecloud1.akaza.lk"

  storage:
    type: "local"
    localBaseDir: "/tmp/bucket"
    localPublicUrl: "/api/v1/uploads"
    # S3 config — only used when storage.type is "s3"
    s3Endpoint: ""
    s3Bucket: "nsw-uploads"
    s3Region: "us-east-1"
    s3UseSsl: true
    s3PublicUrl: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

route:
  enabled: true
  host: "nsw-api-national-single-window-platform.apps.sovecloud1.akaza.lk"
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

# --- Database Migrations (init container) ---
migrations:
  enabled: true
  image:
    repository: registry.redhat.io/rhel8/postgresql-12@sha256:fd7b47517df99487c02d86f57b0b6722c32551bcf89ce61018d6a5e355c7c212
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  ogaSubmissionUrls:
    npqs: "http://oga-npqs-backend.national-single-window-platform.svc.cluster.local:8081/api/oga/inject"
    fcau: "http://oga-fcau-backend.national-single-window-platform.svc.cluster.local:8081/api/oga/inject"
    ird: "http://oga-ird-backend.national-single-window-platform.svc.cluster.local:8081/api/oga/inject"
