apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "oga-app.labels" . | nindent 4 }}
spec:
{{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
{{- end }}
  selector:
    matchLabels:
      {{- include "oga-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "oga-app.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: oga-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: VITE_INSTANCE_CONFIG
              value: {{ .Values.config.instanceConfig | quote }}
            - name: VITE_API_BASE_URL
              value: {{ tpl .Values.config.appUrl . | quote }}
            - name: VITE_IDP_BASE_URL
              value: {{ tpl .Values.config.idpBaseUrl . | quote }}
            - name: VITE_IDP_CLIENT_ID
              value: {{ tpl .Values.config.idpClientId . | quote }}
            - name: VITE_APP_URL
              value: {{ tpl .Values.config.appUrl . | quote }}
            - name: VITE_IDP_SCOPES
              value: {{ .Values.config.idpScopes | quote }}
            - name: VITE_IDP_PLATFORM
              value: {{ .Values.config.idpPlatform | quote }}
            - name: VITE_OGA_API_BASE_URL
              value: {{ printf "%s/api/oga" (tpl .Values.config.appUrl .) | quote }}
            - name: VITE_SHOW_AUTOFILL_BUTTON
              value: "true"
            - name: OGA_BACKEND_URL
              value: {{ tpl .Values.config.ogaBackendUrl . | quote }}
            # Scope nginx envsubst to only substitute ${OGA_BACKEND_URL}
            # Without this, the entrypoint replaces ALL env vars and corrupts $uri, $host, etc.
            - name: NGINX_ENVSUBST_FILTER
              value: "OGA_BACKEND_URL"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ .Values.nginxConfigMapName | default (printf "%s-nginx-config" (include "oga-app.fullname" .)) }}
