# deployments/helm/oga-app/values.yaml

global:
  clusterDomain: "apps.sovecloud1.akaza.lk"
  namespace: "national-single-window-platform"

fullnameOverride: ""
replicaCount: 1

podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

image:
  repository: ghcr.io/opennsw/oga-app
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []
#  - name: ghcr-secret
  
service:
  type: ClusterIP
  port: 80
  targetPort: 8080 # CRITICAL: Unprivileged port for OpenShift Nginx

config:
  # Agency Specifics: Intentionally left blank to FORCE overrides
  instanceConfig: "" 
  idpClientId: ""
  appUrl: ""
  ogaBackendUrl: ""

  # Shared Platform Specifics: Left blank to FORCE environment overrides
  apiBaseUrl: ""
  idpBaseUrl: ""
  idpScopes: "openid,profile,email"
  idpPlatform: "AsgardeoV2"

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

route:
  enabled: true
  host: "" # Leave blank to let OpenShift auto-generate the hyphenated route
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: oga-app
          topologyKey: kubernetes.io/hostname
