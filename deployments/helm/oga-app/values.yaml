# deployments/helm/oga-app/values.yaml

global:
  clusterDomain: "apps.sovecloud1.akaza.lk"
  namespace: "national-single-window-platform"

fullnameOverride: ""
replicaCount: 1

image:
  repository: ghcr.io/opennsw/oga-app
  pullPolicy: Always
  tag: latest

imagePullSecrets:
  - name: ghcr-secret
  
service:
  type: ClusterIP
  port: 80
  targetPort: 8080 # CRITICAL: Unprivileged port for OpenShift Nginx

config:
  # Agency Specifics: Intentionally left blank to FORCE overrides
  instanceConfig: "" 
  idpClientId: ""
  appUrl: ""
  ogaBackendUrl: ""

  # Shared Platform Specifics: Left blank to FORCE environment overrides
  apiBaseUrl: ""
  idpBaseUrl: ""
  idpScopes: "openid,profile,email"
  idpPlatform: "AsgardeoV2"

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

route:
  enabled: true
  host: "" # Leave blank to let OpenShift auto-generate the hyphenated route
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1
