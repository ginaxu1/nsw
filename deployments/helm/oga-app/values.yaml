# Default values for oga-app.
# MUST override with per-instance values files (e.g. oga-fcau-values.yaml).

# Explicitly allow renaming the deployment resources per agency
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/opennsw/oga-app
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets:
  - name: ghcr-secret
  
service:
  type: ClusterIP
  port: 80
  targetPort: 8080 # CRITICAL: Unprivileged port for OpenShift Nginx

# --- Shared configuration ---
config:
  # Agency Specifics: Intentionally left blank to FORCE overrides
  instanceConfig: "" 
  idpClientId: ""
  appUrl: ""

  # Shared Platform Specifics
  apiBaseUrl: "https://nsw-api-national-single-window-platform.apps.sovecloud1.akaza.lk/api/v1"
  idpBaseUrl: "https://idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk"
  idpScopes: "openid,profile,email"
  idpPlatform: "AsgardeoV2"

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

route:
  enabled: true
  host: "" # Must override in agency values file
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
