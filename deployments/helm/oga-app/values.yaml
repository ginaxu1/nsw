# Default values for oga-app.
# This is a generic chart -- all OGA-specific identity is in per-agency values files.

replicaCount: 1

image:
  repository: ghcr.io/opennsw/oga-app
  pullPolicy: Always
  tag: latest

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  # The external port the service exposes
  port: 80
  # Must match the Nginx 'listen' port (8080 for non-root)
  targetPort: 8080

config:
  instanceConfig: ""
  apiBaseUrl: "https://nsw-api-national-single-window-platform.apps.sovecloud.akaza.lk/api/v1"
  idpBaseUrl: "https://idp-thunder-national-single-window-platform.apps.sovecloud.akaza.lk"
  idpClientId: ""
  appUrl: ""
  idpScopes: "openid,profile,email"
  idpPlatform: "AsgardeoV2"

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

route:
  enabled: true
  host: ""
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect