# Default values for oga-app.
# Override with per-instance values files (e.g. oga-npqs-values.yaml).

replicaCount: 1

image:
  repository: ghcr.io/opennsw/oga-app
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets:
  - name: ghcr-pull-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 80

config:
  instanceConfig: "npqs"
  apiBaseUrl: "https://nsw-api-national-single-window-platform.lgc.gov.lk/api/v1"
  idpBaseUrl: "https://idp-route.national-single-window-platform.lgc.gov.lk"
  idpClientId: "OGA_PORTAL_APP_NPQS"
  appUrl: "https://npqs-portal-national-single-window-platform.lgc.gov.lk"
  idpScopes: "openid,profile,email"
  idpPlatform: "AsgardeoV2"

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

route:
  enabled: true
  host: npqs-portal-national-single-window-platform.lgc.gov.lk
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
