# Default values for oga-app.

fullnameOverride: "oga-app"

replicaCount: 1

image:
  repository: ghcr.io/opennsw/oga-app
  pullPolicy: Always
  tag: latest

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  # The external port the service exposes
  port: 80
  # CRITICAL: Must match the Nginx 'listen' port (8080 for non-root)
  targetPort: 8080

config:
  instanceConfig: "npqs"
  apiBaseUrl: "https://nsw-api-national-single-window-platform.lgc.gov.lk/api/v1"
  idpBaseUrl: "https://idp-thunder-national-single-window-platform.apps.sovecloud.akaza.lk"
  idpClientId: "OGA_PORTAL_APP_NPQS"
  appUrl: "https://oga-app-national-single-window-platform.apps.sovecloud.akaza.lk"
  idpScopes: "openid,profile,email"
  idpPlatform: "AsgardeoV2"

resources:
  limits:
    cpu: 200m
    memory: 256Mi # Increased slightly; 128Mi can be tight for Nginx + sidecars
  requests:
    cpu: 50m
    memory: 128Mi

route:
  enabled: true
  host: ""
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect