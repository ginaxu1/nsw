# OGA-IRD Portal Values
# Usage: helm upgrade --install oga-ird-app ./deployments/helm/oga-app -f deployments/helm/oga-app/ird-app-values.yaml --history-max 3

nameOverride: oga-ird-app
fullnameOverride: oga-ird-app

config:
  instanceConfig: "ird"
  apiBaseUrl: "/api"
  backendServiceName: "oga-ird-backend"
  idpBaseUrl: "https://idp-thunder-national-single-window-platform.apps.sovecloud.akaza.lk"
  idpClientId: "OGA_PORTAL_APP_IRD"
  appUrl: "https://oga-ird-national-single-window-platform.apps.sovecloud.akaza.lk"

route:
  host: oga-ird-national-single-window-platform.apps.sovecloud.akaza.lk
