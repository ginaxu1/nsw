# Values override for the NPQS OGA instance.
# Usage: helm install oga-npqs ./oga-app -f oga-app/oga-npqs-values.yaml

image:
  tag: "0.1.0"

config:
  instanceConfig: "npqs"
  apiBaseUrl: "https://nsw-api-national-single-window-platform.lgc.gov.lk/api/v1"
  idpBaseUrl: "https://idp-route.national-single-window-platform.lgc.gov.lk"
  idpClientId: "OGA_PORTAL_APP_NPQS"
  appUrl: "https://npqs-portal-national-single-window-platform.lgc.gov.lk"

route:
  host: npqs-portal-national-single-window-platform.lgc.gov.lk
