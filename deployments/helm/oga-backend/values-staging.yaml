# Staging Overrides for oga-backend

replicaCount: 2

global:
  clusterDomain: "apps.sovecloud1.akaza.lk"
  namespace: "national-single-window-platform"

config:
  database:
    host: "nsw-db"
    credentialsSecretName: "nsw-db-credentials"
  nswApiBaseUrl: "http://staging-nsw-api:8080/api/v1"
  allowedOrigins: "https://staging-oga-fcau-national-single-window-platform.apps.sovecloud1.akaza.lk,https://staging-oga-ird-national-single-window-platform.apps.sovecloud1.akaza.lk,https://staging-oga-npqs-national-single-window-platform.apps.sovecloud1.akaza.lk"

route:
  enabled: true
  # host is omitted to allow OpenShift to generate it automatically
