# OGA-FCAU Backend Values
nameOverride: oga-fcau-backend
fullnameOverride: oga-fcau-backend

# Resource Management (Akaza Quotas)
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

image:
  tag: latest
imagePullSecrets:
  - name: ghcr-secret

# Isolated Database Configuration
env:
  - name: OGA_DB_DRIVER
    value: "postgres"
  - name: OGA_DB_NAME
    value: "oga-backend-fcau" 
  - name: OGA_DB_USER
    value: "oga_fcau_user"
  - name: OGA_DB_PASSWORD
    value: "oga_fcau_pw"
  - name: OGA_DB_HOST
    value: "nsw-db"
  - name: OGA_ALLOWED_ORIGINS
    value: "https://oga-fcau-national-single-window-platform.apps.sovecloud.akaza.lk"
  - name: NSW_API_BASE_URL
    value: "http://nsw-api.national-single-window-platform.svc.cluster.local/api/v1"

config:
  port: 8081

route:
  enabled: true
  host: oga-fcau-backend-national-single-window-platform.apps.sovecloud.akaza.lk
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

seeding:
  enabled: true