{{- if .Values.seeding.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "oga-backend.fullname" . }}-seed-{{ .Release.Revision }}
  labels:
    {{- include "oga-backend.labels" . | nindent 4 }}
  annotations:
    # Run the seed data injection after the backend pod has been deployed/upgraded
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: {{ include "oga-backend.fullname" . }}-seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: registry.access.redhat.com/ubi8/ubi-minimal:latest
          command: ["sh", "/scripts/seed.sh"]
          volumeMounts:
            - name: script
              mountPath: /scripts
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: script
          configMap:
            name: {{ include "oga-backend.fullname" . }}-seed
            defaultMode: 0755
{{- end }}
