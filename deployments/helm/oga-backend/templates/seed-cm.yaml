{{- if .Values.seeding.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oga-backend.fullname" . }}-seed
  labels:
    {{- include "oga-backend.labels" . | nindent 4 }}
data:
  seed.sh: |
    #!/bin/sh
    set -e
    
    # Wait for the backend API to become available
    echo "Waiting for backend at http://{{ include "oga-backend.fullname" . }}:{{ .Values.config.port | default 8081 }} to become ready..."
    max_retries=30
    count=0
    while ! curl -s --max-time 3 "http://{{ include "oga-backend.fullname" . }}:80/health" > /dev/null; do
      sleep 2
      count=$((count+1))
      if [ $count -ge $max_retries ]; then
        echo "Timeout waiting for backend to start."
        exit 1
      fi
    done
    
    URL="http://{{ include "oga-backend.fullname" . }}:80/api/oga/inject"
    
    {{- if contains "fcau" .Values.nameOverride }}
    echo "Seeding FCAU Backend Test Applications..."
    
    # FCAU Task 1
    curl -s -X POST -d '{
      "taskId": "fcau-task-001",
      "workflowId": "consignment-101",
      "serviceUrl": "http://nsw-api/api/v1/tasks",
      "data": {
        "consigneeName": "Global Foods Ltd",
        "consigneeAddress": "456 Market St, London, UK",
        "productDescription": "Frozen Seafood (Prawns)",
        "batchLotNumbers": "B-2026-X01",
        "productionExpiryDates": "PR: 2026-01-01, EX: 2027-01-01",
        "microbiologicalTestReportId": "TR-9988-ABC",
        "processingPlantRegistrationNo": "PP-LKA-001"
      },
      "meta": {
        "type": "consignment:edb:fcau:health-certificate:001",
        "verificationId": "FCAU-VC-001"
      }
    }' -H "Content-Type: application/json" "$URL"
    
    # FCAU Task 2
    curl -s -X POST -d '{
      "taskId": "fcau-task-002",
      "workflowId": "consignment-102",
      "serviceUrl": "http://nsw-api/api/v1/tasks",
      "data": {
        "consigneeName": "Oceanic Imports Inc",
        "consigneeAddress": "789 Harbor Blvd, Sydney, AU",
        "productDescription": "Canned Tuna",
        "batchLotNumbers": "C-2026-T99",
        "productionExpiryDates": "PR: 2026-02-15, EX: 2028-02-15",
        "microbiologicalTestReportId": "TR-1122-XYZ",
        "processingPlantRegistrationNo": "PP-LKA-005"
      },
      "meta": {
        "type": "consignment:edb:fcau:health-certificate:001",
        "verificationId": "FCAU-VC-002"
      }
    }' -H "Content-Type: application/json" "$URL"
    
    # FCAU Task 3
    curl -s -X POST -d '{
      "taskId": "fcau-task-003",
      "workflowId": "consignment-103",
      "serviceUrl": "http://nsw-api/api/v1/tasks",
      "data": {
        "consigneeName": "Euro Delicacies GmbH",
        "consigneeAddress": "12 Berlin Ave, Berlin, DE",
        "productDescription": "Export Quality Cinnamon",
        "batchLotNumbers": "SP-2026-C04",
        "productionExpiryDates": "PR: 2026-03-01, EX: 2029-03-01",
        "microbiologicalTestReportId": "TR-4455-DEF",
        "processingPlantRegistrationNo": "PP-LKA-012"
      },
      "meta": {
        "type": "consignment:edb:fcau:health-certificate:001",
        "verificationId": "FCAU-VC-003"
      }
    }' -H "Content-Type: application/json" "$URL"
    
    {{- else if contains "ird" .Values.nameOverride }}
    echo "Seeding IRD Backend Test Applications..."
    
    # IRD Task 1
    curl -s -X POST -d '{
      "taskId": "ird-task-001",
      "workflowId": "pre-consignment-201",
      "serviceUrl": "http://nsw-api/api/v1/tasks",
      "data": {
        "bi:businessName": "ABC Exports Ltd",
        "bi:taxIdentificationNumber": "TID-12345678",
        "bi:businessAddress": "123 Main Street, Colombo 01",
        "bi:email": "info@abcexports.lk"
      },
      "meta": {
        "type": "preconsignment:ird:general-trader-verification:001",
        "verificationId": "IRD-VC-001"
      }
    }' -H "Content-Type: application/json" "$URL"
    
    # IRD Task 2
    curl -s -X POST -d '{
      "taskId": "ird-task-002",
      "workflowId": "pre-consignment-202",
      "serviceUrl": "http://nsw-api/api/v1/tasks",
      "data": {
        "bi:businessName": "Mega Trading Co",
        "bi:taxIdentificationNumber": "TID-87654321",
        "bi:businessAddress": "45 Galle Road, Mount Lavinia",
        "bi:email": "contact@megatrading.lk"
      },
      "meta": {
        "type": "preconsignment:ird:general-trader-verification:001",
        "verificationId": "IRD-VC-002"
      }
    }' -H "Content-Type: application/json" "$URL"
    
    # IRD Task 3
    curl -s -X POST -d '{
      "taskId": "ird-task-003",
      "workflowId": "pre-consignment-203",
      "serviceUrl": "http://nsw-api/api/v1/tasks",
      "data": {
        "bi:businessName": "Lanka Logistics PLC",
        "bi:taxIdentificationNumber": "TID-11223344",
        "bi:businessAddress": "88 Industrial Park, Katunayake",
        "bi:email": "admin@lankalogistics.lk"
      },
      "meta": {
        "type": "preconsignment:ird:general-trader-verification:001",
        "verificationId": "IRD-VC-003"
      }
    }' -H "Content-Type: application/json" "$URL"
    
    {{- else if contains "npqs" .Values.nameOverride }}
    echo "Seeding NPQS Backend Test Applications..."
    
    # NPQS Task 1
    curl -s -X POST -d '{
      "taskId": "npqs-task-001",
      "workflowId": "pre-consignment-301",
      "serviceUrl": "http://nsw-api/api/v1/tasks",
      "data": {
        "pi:botanicalName": "Cocos nucifera",
        "pi:quantity": "5000 Units",
        "pi:originCountry": "Sri Lanka",
        "pi:destinationCountry": "USA"
      },
      "meta": {
        "type": "preconsignment:npqs:phytosanitary-certificate:001",
        "verificationId": "NPQS-VC-001"
      }
    }' -H "Content-Type: application/json" "$URL"
    
    # NPQS Task 2
    curl -s -X POST -d '{
      "taskId": "npqs-task-002",
      "workflowId": "pre-consignment-302",
      "serviceUrl": "http://nsw-api/api/v1/tasks",
      "data": {
        "pi:botanicalName": "Camellia sinensis",
        "pi:quantity": "25000 kg",
        "pi:originCountry": "Sri Lanka",
        "pi:destinationCountry": "UK"
      },
      "meta": {
        "type": "preconsignment:npqs:phytosanitary-certificate:001",
        "verificationId": "NPQS-VC-002"
      }
    }' -H "Content-Type: application/json" "$URL"
    
    # NPQS Task 3
    curl -s -X POST -d '{
      "taskId": "npqs-task-003",
      "workflowId": "pre-consignment-303",
      "serviceUrl": "http://nsw-api/api/v1/tasks",
      "data": {
        "pi:botanicalName": "Hevea brasiliensis",
        "pi:quantity": "10000 Sheets",
        "pi:originCountry": "Sri Lanka",
        "pi:destinationCountry": "China"
      },
      "meta": {
        "type": "preconsignment:npqs:phytosanitary-certificate:001",
        "verificationId": "NPQS-VC-003"
      }
    }' -H "Content-Type: application/json" "$URL"
    
    {{- end }}
    
    echo "Seeding completed successfully."
{{- end }}
