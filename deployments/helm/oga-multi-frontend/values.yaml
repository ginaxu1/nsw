# oga-multi-frontend values

image:
  repository: ghcr.io/opennsw/oga-app
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

# Agency configurations
agencies:
  fcau:
    enabled: true
    port: 8080
    viteInstanceConfig: "fcau"
    viteApiBaseUrl: "/api"
    viteIdpBaseUrl: "https://idp-thunder-national-single-window-platform.apps.sovecloud.akaza.lk"
    viteIdpClientId: "OGA_PORTAL_APP_FCAU"
    viteAppUrl: "https://oga-fcau-national-single-window-platform.apps.sovecloud.akaza.lk"
    routeHost: "oga-fcau-national-single-window-platform.apps.sovecloud.akaza.lk"
  ird:
    enabled: true
    port: 8081
    viteInstanceConfig: "ird"
    viteApiBaseUrl: "/api"
    viteIdpBaseUrl: "https://idp-thunder-national-single-window-platform.apps.sovecloud.akaza.lk"
    viteIdpClientId: "OGA_PORTAL_APP_IRD"
    viteAppUrl: "https://oga-ird-national-single-window-platform.apps.sovecloud.akaza.lk"
    routeHost: "oga-ird-national-single-window-platform.apps.sovecloud.akaza.lk"
  npqs:
    enabled: true
    port: 8082
    viteInstanceConfig: "npqs"
    viteApiBaseUrl: "/api"
    viteIdpBaseUrl: "https://idp-thunder-national-single-window-platform.apps.sovecloud.akaza.lk"
    viteIdpClientId: "OGA_PORTAL_APP_NPQS"
    viteAppUrl: "https://oga-npqs-national-single-window-platform.apps.sovecloud.akaza.lk"
    routeHost: "oga-npqs-national-single-window-platform.apps.sovecloud.akaza.lk"

# Resource Management (Safety Guards)
resources:
  limits:
    cpu: 200m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Probe settings
probes:
  initialDelaySeconds: 5
  periodSeconds: 15
  failureThreshold: 3

# Global configuration for all OGA portals
config:
  viteOgaApiBaseUrl: "https://nsw-api-national-single-window-platform.apps.sovecloud.akaza.lk/api/v1"
  viteIdpScopes: "openid,profile,email"
  viteIdpPlatform: "AsgardeoV2"
  viteShowAutofillButton: "true"
