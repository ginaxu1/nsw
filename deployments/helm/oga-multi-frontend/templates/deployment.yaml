apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oga-multi-frontend.fullname" . }}
  labels:
    {{- include "oga-multi-frontend.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "oga-multi-frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "oga-multi-frontend.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        {{- range $key, $agency := .Values.agencies }}
        {{- if $agency.enabled }}
        - name: {{ $key }}-portal
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: {{ $key }}-http
              containerPort: {{ $agency.port }}
              protocol: TCP
          env:
            - name: VITE_INSTANCE_CONFIG
              value: {{ $agency.viteInstanceConfig | quote }}
            - name: VITE_API_BASE_URL
              value: {{ $agency.viteApiBaseUrl | quote }}
            - name: VITE_IDP_BASE_URL
              value: {{ $agency.viteIdpBaseUrl | quote }}
            - name: VITE_IDP_CLIENT_ID
              value: {{ $agency.viteIdpClientId | quote }}
            - name: VITE_APP_URL
              value: {{ $agency.viteAppUrl | quote }}
            - name: VITE_IDP_SCOPES
              value: {{ $.Values.config.viteIdpScopes | quote }}
            - name: VITE_IDP_PLATFORM
              value: {{ $.Values.config.viteIdpPlatform | quote }}
            - name: VITE_OGA_API_BASE_URL
              value: {{ $.Values.config.viteOgaApiBaseUrl | quote }}
            - name: VITE_SHOW_AUTOFILL_BUTTON
              value: {{ $.Values.config.viteShowAutofillButton | quote }}
          volumeMounts:
            - name: nginx-configs
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx-{{ $key }}.conf
          # Health checks per container (Safety Guard)
          livenessProbe:
            tcpSocket:
              port: {{ $key }}-http
            initialDelaySeconds: {{ $.Values.probes.initialDelaySeconds }}
            periodSeconds: {{ $.Values.probes.periodSeconds }}
            failureThreshold: {{ $.Values.probes.failureThreshold }}
          readinessProbe:
            tcpSocket:
              port: {{ $key }}-http
            initialDelaySeconds: {{ $.Values.probes.initialDelaySeconds }}
            periodSeconds: {{ $.Values.probes.periodSeconds }}
            failureThreshold: {{ $.Values.probes.failureThreshold }}
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
        {{- end }}
        {{- end }}
      volumes:
        - name: nginx-configs
          configMap:
            name: {{ include "oga-multi-frontend.fullname" . }}-nginx-configs
