{{- range $key, $agency := .Values.agencies }}
{{- if $agency.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: oga-{{ $key }}-app
  labels:
    {{- include "oga-multi-frontend.labels" $ | nindent 4 }}
spec:
  host: {{ $agency.routeHost }}
  to:
    kind: Service
    name: {{ include "oga-multi-frontend.fullname" $ }}
  port:
    targetPort: {{ $key }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
{{- end }}
