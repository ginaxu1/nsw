apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "idp-thunder.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "idp-thunder.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "idp-thunder.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "idp-thunder.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      
      # OpenShift compatibility: Let the cluster assign a random UID/GID
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: thunder
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Unified Command: Starts server in background, waits for HTTPS port, runs bootstrap
          command:
            - /bin/bash
            - -c
            - |
              ./thunder server &
              
              # Wait for the API to respond 200 OK
              echo "Waiting for Thunder API..."
              while ! wget --no-check-certificate -qO- https://localhost:8090/console > /dev/null 2>&1; do
                sleep 2
              done
              
              echo "API is up. Giving auth system 5s to initialize..."
              sleep 5

              echo "Syncing and executing scripts..."
              cp /opt/thunder/bootstrap/*.sh /tmp/
              chmod +x /tmp/*.sh

              # Force the env vars into the current shell
              export THUNDER_ADMIN_USERNAME="{{ .Values.auth.adminUsername }}"
              export THUNDER_ADMIN_PASSWORD="${THUNDER_ADMIN_PASSWORD}"
              export THUNDER_API_BASE="https://localhost:8090"
              export SKIP_SSL_VERIFICATION="true"
              
              # Run with bash and capture output
              /bin/bash /tmp/01-default-resources.sh
              /bin/bash /tmp/02-sample-resources.sh
              
              echo "Bootstrap sequence finished."
              wait
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: THUNDER_API_BASE
              value: "https://localhost:8090"
            - name: THUNDER_ADMIN_USERNAME
              value: {{ .Values.auth.adminUsername | quote }}
            - name: THUNDER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.secretKey }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          volumeMounts:
            - name: db-data
              mountPath: /opt/thunder/repository/database
            - name: security-keys
              mountPath: /opt/thunder/repository/resources/security
              readOnly: true
            - name: deployment-yaml
              mountPath: /opt/thunder/repository/conf/deployment.yaml
              subPath: deployment.yaml
            - name: setup-scripts
              mountPath: /opt/thunder/bootstrap/01-default-resources.sh
              subPath: 01-default-resources.sh
            - name: setup-scripts
              mountPath: /opt/thunder/bootstrap/02-sample-resources.sh
              subPath: 02-sample-resources.sh
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /console
              port: http
              scheme: HTTPS
            initialDelaySeconds: 45
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /console
              port: http
              scheme: HTTPS
            initialDelaySeconds: 20
            periodSeconds: 15

      volumes:
        - name: db-data
          emptyDir: {}
        - name: security-keys
          secret:
            secretName: idp-thunder-keys
            defaultMode: 0444
        - name: setup-scripts
          configMap:
            name: {{ include "idp-thunder.fullname" . }}-scripts
            defaultMode: 0755
        - name: deployment-yaml
          configMap:
            name: {{ include "idp-thunder.fullname" . }}-config
            defaultMode: 0644