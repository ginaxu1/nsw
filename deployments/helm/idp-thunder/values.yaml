fullnameOverride: "idp-thunder"
replicaCount: 1

image:
  repository: ghcr.io/asgardeo/thunder
  pullPolicy: IfNotPresent
  tag: 0.29.0

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 8090

route:
  enabled: true
  host: "idp-thunder-national-single-window-platform.apps.sovecloud.akaza.lk"
  tls:
    enabled: true
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect

auth:
  adminUsername: "admin"
  existingSecret: "thunder-auth-secret"
  secretKey: "adminPassword" 

# --- OpenShift / Akaza Compatibility Section ---
resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

# Security Context (Fixes 'permission denied' on signing.key)
podSecurityContext:
  {}

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: false