apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "temporal.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "temporal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "temporal.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      initContainers:
        # Copy original configs to a writable volume so auto-setup can modify them
        - name: copy-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c", "cp -ra /etc/temporal/config/* /tmp/config/"]
          volumeMounts:
            - name: temporal-config
              mountPath: /tmp/config
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: temporal
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: server
              containerPort: 7233
          env:
            - name: DB
              value: "postgres12"
            - name: DB_NAME
              value: {{ .Values.env.dbName | default "temporal_db" | quote }}
            - name: POSTGRES_SEEDS
              value: {{ .Values.persistence.host | default (printf "%s-nsw-db" .Release.Name) | quote }}
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.persistence.credentialsSecretName | default (printf "%s-db-credentials" .Release.Name) }}
                  key: username
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.persistence.credentialsSecretName | default (printf "%s-db-credentials" .Release.Name) }}
                  key: password
            - name: SKIP_SCHEMA_SETUP
              value: "false"
            - name: SKIP_DB_CREATE
              value: "false"
            - name: HOME
              value: "/tmp"
            - name: BIND_ON_IP
              value: "0.0.0.0"
            - name: TEMPORAL_ADDRESS
              value: "127.0.0.1:7233"
            {{- if .Values.env.extraEnv }}
            {{- toYaml .Values.env.extraEnv | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: temporal-config
              mountPath: /etc/temporal/config
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
        - name: temporal-ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: ui
              containerPort: 8080
          env:
            - name: TEMPORAL_ADDRESS
              value: "localhost:7233"
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: temporal-config
          emptyDir: {}
