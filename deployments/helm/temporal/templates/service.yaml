apiVersion: v1
kind: Service
metadata:
  name: {{ include "temporal.fullname" . }}-server
  labels:
    {{- include "temporal.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 7233
      targetPort: server
      protocol: TCP
      name: grpc
    - port: 8080
      targetPort: ui
      protocol: TCP
      name: ui
  selector:
    {{- include "temporal.selectorLabels" . | nindent 4 }}
