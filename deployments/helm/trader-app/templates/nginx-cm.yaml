apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trader-app.fullname" . }}-nginx-config
  labels:
    app.kubernetes.io/name: {{ include "trader-app.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  default.conf.template: |
    server {
        listen 8080;
        server_tokens off;
        server_name localhost;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_min_length 256;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Never cache index.html to ensure users always get the latest configuration
        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location = /runtime-env.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Health check for the portal itself
        location /health {
            access_log off;
            return 200 'OK';
        }
    }
