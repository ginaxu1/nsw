# Default values for trader-app.

fullnameOverride: "trader-app"

replicaCount: 1

image:
  repository: ghcr.io/opennsw/trader-app
  pullPolicy: Always
  tag: latest

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  # External port
  port: 80
  # Internal port: Must match Nginx listening on 8080 (unprivileged)
  targetPort: 8080

config:
  apiBaseUrl: "https://nsw-api-national-single-window-platform.apps.sovecloud.akaza.lk/api/v1"
  idpBaseUrl: "https://idp-thunder-national-single-window-platform.apps.sovecloud.akaza.lk"
  idpClientId: "TRADER_PORTAL_APP"
  appUrl: "https://trader-app-national-single-window-platform.apps.sovecloud.akaza.lk"
  idpScopes: "openid,profile,email"
  idpPlatform: "AsgardeoV2"
  showAutofillButton: "true"

resources:
  limits:
    cpu: 200m
    # Increased to 256Mi to prevent OOMKills during runtime-env script execution
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

route:
  enabled: true
  host: "" 
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect