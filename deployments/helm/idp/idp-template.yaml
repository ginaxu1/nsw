apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-thunder-deployment
  namespace: national-single-window-platform
  labels:
    helm.sh/chart: thunder-0.29.0
    app.kubernetes.io/name: thunder
    app.kubernetes.io/instance: idp-thunder
    app.kubernetes.io/version: "0.29.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: thunder
      app.kubernetes.io/instance: idp-thunder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thunder
        app.kubernetes.io/instance: idp-thunder
      annotations:
        checksum.deployment.yaml: ea0d436c6e788a2f0f73c0a62e1e052443775e6114b6ce62060bbb91c871fae3
    spec:
      serviceAccountName: thunder-service-account
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - thunder
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - idp-thunder
                topologyKey: topology.kubernetes.io/zone
      terminationGracePeriodSeconds: 10
      containers:
        - name: thunder
          image: ghcr.io/asgardeo/thunder:0.29.0
          imagePullPolicy: Always
          env:
            - name: THUNDER_SKIP_SECURITY
              value: "false"
            
            - name: DB_CONFIG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nsw-db-credentials
                  key: password
            - name: DB_RUNTIME_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nsw-db-credentials
                  key: password
            - name: DB_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nsw-db-credentials
                  key: password
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - nc -z localhost 8090
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 8090
              scheme: HTTP
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 8090
              scheme: HTTP
            initialDelaySeconds: 1
            periodSeconds: 10
          resources:
            requests:
              memory: 50Mi
              cpu: 100m
            limits:
              memory: 100Mi
              cpu: 200m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - all
          ports:
            - containerPort: 8090
              protocol: TCP
          volumeMounts:
            - name: deployment-yaml-volume
              mountPath: /opt/thunder/repository/conf/deployment.yaml
              subPath: deployment.yaml
            - name: gate-config-volume
              mountPath: /opt/thunder/apps/gate/config.js
              subPath: gate-config.js
            - name: console-config-volume
              mountPath: /opt/thunder/apps/console/config.js
              subPath: console-config.js
      volumes:
        - name: deployment-yaml-volume
          configMap:
            name: idp-thunder-config-map
        - name: gate-config-volume
          configMap:
            name: idp-thunder-config-map
        - name: console-config-volume
          configMap:
            name: idp-thunder-config-map
