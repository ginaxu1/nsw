data:
  deployment.yaml: "# Copyright (c) 2025, WSO2 LLC. (https://www.wso2.com).\n#\n# WSO2 LLC. licenses this file to you under the Apache License,\n# Version 2.0 (the \"License\"); you may not use this file except\n# in compliance with the License.\n# You may obtain a copy of the License at\n#\n# http://www.apache.org/licenses/LICENSE-2.0\n#\n# Unless required by applicable law or agreed to in writing,\n# software distributed under the License is distributed on an\n# \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY\n# KIND, either express or implied. See the License for the\n# specific language governing permissions and limitations\n# under the License.\n\nserver:\n  hostname: \"0.0.0.0\"\n  port: 8090\n  http_only: true\n  public_url: \"https://idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk\"\n\ngate_client:\n  hostname: \"idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk\"\n  port: 443\n  scheme: \"https\"\n  login_path: \n  error_path: \n\ntls:\n  min_version: \"1.3\"\n  cert_file: \"repository/resources/security/server.cert\"\n  key_file: \"repository/resources/security/server.key\"\n\ncrypto:\n  encryption:\n    key: \"file://repository/resources/security/crypto.key\"\n  password_hashing:\n    algorithm: \"PBKDF2\"\n    parameters:\n      iterations: 600000\n      key_size: 32\n      salt_size: 16\n  keys:\n    - id: \"default-key\"\n      cert_file: \"repository/resources/security/signing.cert\"\n      key_file: \"repository/resources/security/signing.key\"\n\ndatabase:\n  config:\n    type: \"postgres\"\n    hostname: \"nsw-db\"\n    port: 5432\n    name: \"configdb\"\n    username: \"postgres\"\n    password: \"{{.DB_CONFIG_PASSWORD}}\"\n    sslmode: \"disable\"\n  runtime:\n    type: \"postgres\"\n    hostname: \"nsw-db\"\n    port: 5432\n    name: \"runtimedb\"\n    username: \"postgres\"\n    password: \"{{.DB_RUNTIME_PASSWORD}}\"\n    sslmode: \"disable\"\n  user:\n    type: \"postgres\"\n    hostname: \"nsw-db\"\n    port: 5432\n    name: \"userdb\"\n    username: \"postgres\"\n    password: \"{{.DB_USER_PASSWORD}}\"\n    sslmode: \"disable\"    \n\ncache:\n  disabled: true\n  type: \"inmemory\"\n  size: 1000\n  ttl: 3600\n  eviction_policy: \"LRU\"\n  cleanup_interval: 300\n\njwt:\n  issuer: \n  validity_period: 3600\n  audience: \"application\"\n  preferred_key_id: \"default-key\"\n\noauth:\n  refresh_token:\n    renew_on_grant: false\n    validity_period: 86400\n  authorization_code:\n    validity_period: 600\n  dcr:\n    insecure: false\n\nflow:\n  default_auth_flow_handle: \"default-basic-flow\"\n  max_version_history: 3\n  auto_infer_registration: true\n\ncors:\n  allowed_origins:\n    - \"https://localhost:3000\"\n\npasskey:\n  allowed_origins:\n    - \"https://localhost:8090\"\n\nconsent:\n  enabled: false\n  base_url: \"\"\n  timeout: 5\n  max_retries: 3\n"
  gate-config.js: "/**\n * Copyright (c) 2025, WSO2 LLC. (https://www.wso2.com).\n *\n * WSO2 LLC. licenses this file to you under the Apache License,\n * Version 2.0 (the \"License\"); you may not use this file except\n * in compliance with the License.\n * You may obtain a copy of the License at\n *\n *     http://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required by applicable law or agreed to in writing,\n * software distributed under the License is distributed on an\n * \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY\n * KIND, either express or implied. See the License for the\n * specific language governing permissions and limitations\n * under the License.\n */\n\n/* eslint-disable no-underscore-dangle */\n\nwindow.__THUNDER_RUNTIME_CONFIG__ = {\n  client: {\n    base: \"/gate\",\n  },\n  server: {\n    // Not used when public_url is set\n    hostname: \"0.0.0.0\",\n    port: 8090,\n    http_only: true,\n    public_url: \"https://idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk\",\n  },\n};\n"
  console-config.js: "/**\n * Copyright (c) 2025, WSO2 LLC. (https://www.wso2.com).\n *\n * WSO2 LLC. licenses this file to you under the Apache License,\n * Version 2.0 (the \"License\"); you may not use this file except\n * in compliance with the License.\n * You may obtain a copy of the License at\n *\n *     http://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required by applicable law or agreed to in writing,\n * software distributed under the License is distributed on an\n * \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY\n * KIND, either express or implied. See the License for the\n * specific language governing permissions and limitations\n * under the License.\n */\n\n/* eslint-disable no-underscore-dangle */\n\nwindow.__THUNDER_RUNTIME_CONFIG__ = {\n  client: {\n    base: \"/console\",\n    client_id: \"CONSOLE\",\n    scopes: ['openid', 'profile', 'email', 'ou', 'system', 'system:user', 'system:group', 'system:ou:view', 'system:userschema:view'],\n  },\n  server: {\n    // Not used when public_url is set\n    hostname: \"0.0.0.0\",\n    port: 8090,\n    http_only: true,\n    public_url: \"https://idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk\",\n  },\n};\n"
