apiVersion: v1
kind: ConfigMap
metadata:
  name: idp-thunder-seed-cm
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  seed.sh: |-
    #!/bin/bash
    # Seed IDP with users and fix CORS for portals
    
    THUNDER_URL="http://idp-thunder-service:8090"
    
    thunder_api_call() {
        local method="$1"
        local endpoint="$2"
        local data="${3:-}"
        local url="${THUNDER_URL}${endpoint}"
    
        if [ -z "$data" ]; then
            curl -k -s -w "\n%{http_code}" -X "$method" "$url" -H "Content-Type: application/json"
        else
            curl -k -s -w "\n%{http_code}" -X "$method" "$url" -H "Content-Type: application/json" -d "$data"
        fi
    }
    
    extract_id() {
        echo "$1" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4
    }
    
    # 1. Create OUs
    create_ou() {
        local handle="$1"
        local name="$2"
        local parent="${3:-}"
        local payload="{\"handle\":\"$handle\",\"name\":\"$name\""
        if [ -n "$parent" ]; then payload="$payload,\"parent\":\"$parent\""; fi
        payload="$payload}"
        
        RESPONSE=$(thunder_api_call POST "/organization-units" "$payload")
        if [[ "${RESPONSE: -3}" =~ ^20 ]]; then
            echo $(extract_id "${RESPONSE%???}")
        else
            # Try to get existing
            RESPONSE=$(thunder_api_call GET "/organization-units/tree/$handle")
            echo $(extract_id "${RESPONSE%???}")
        fi
    }
    
    # 2. Create User Types
    create_user_type() {
        local name="$1"
        local ou_id="$2"
        local payload="{\"name\":\"$name\",\"ouId\":\"$ou_id\",\"allowSelfRegistration\":false,\"schema\":{\"username\":{\"type\":\"string\",\"required\":true,\"unique\":true},\"password\":{\"type\":\"string\",\"required\":true,\"credential\":true},\"email\":{\"type\":\"string\",\"required\":true,\"unique\":true},\"given_name\":{\"type\":\"string\",\"required\":false},\"family_name\":{\"type\":\"string\",\"required\":false}},\"systemAttributes\":{\"display\":\"username\"}}"
        thunder_api_call POST "/user-schemas" "$payload" > /dev/null
    }
    
    # 3. Create User
    create_user() {
        local type="$1"
        local ou_id="$2"
        local username="$3"
        local email="$4"
        local pwd="$5"
        local payload="{\"type\":\"$type\",\"ouId\":\"$ou_id\",\"attributes\":{\"username\":\"$username\",\"password\":\"$pwd\",\"email\":\"$email\"}}"
        RESPONSE=$(thunder_api_call POST "/users" "$payload")
        echo $(extract_id "${RESPONSE%???}")
    }
    
    # 4. Create Role/Group
    create_group() {
        local name="$1"
        local ou_id="$2"
        local payload="{\"name\":\"$name\",\"ouId\":\"$ou_id\"}"
        RESPONSE=$(thunder_api_call POST "/groups" "$payload")
        echo $(extract_id "${RESPONSE%???}")
    }
    
    create_role() {
        local name="$1"
        local ou_id="$2"
        local payload="{\"name\":\"$name\",\"ouId\":\"$ou_id\",\"permissions\":[]}"
        RESPONSE=$(thunder_api_call POST "/roles" "$payload")
        echo $(extract_id "${RESPONSE%???}")
    }
    
    # --- MAIN SEEDING ---
    
    echo "Starting seeding..."
    
    PRIVATE_SECTOR_OU_ID=$(create_ou "private-sector" "Private Sector")
    ABCD_TRADERS_OU_ID=$(create_ou "abcd-traders" "ABCD Traders" "$PRIVATE_SECTOR_OU_ID")
    GOVT_ORG_OU_ID=$(create_ou "government-organization" "Government Organization")
    NPQS_OU_ID=$(create_ou "npqs" "NPQS" "$GOVT_ORG_OU_ID")
    FCAU_OU_ID=$(create_ou "fcau" "FCAU" "$GOVT_ORG_OU_ID")
    IRD_OU_ID=$(create_ou "ird" "IRD" "$GOVT_ORG_OU_ID")
    
    create_user_type "Private_User" "$PRIVATE_SECTOR_OU_ID"
    create_user_type "Government_User" "$GOVT_ORG_OU_ID"
    
    TRADERS_GRP_ID=$(create_group "Traders" "$ABCD_TRADERS_OU_ID")
    CHA_GRP_ID=$(create_group "CHA" "$ABCD_TRADERS_OU_ID")
    TRADER_ROLE_ID=$(create_role "Trader" "$PRIVATE_SECTOR_OU_ID")
    CHA_ROLE_ID=$(create_role "CHA" "$PRIVATE_SECTOR_OU_ID")
    
    # Assign roles to groups
    thunder_api_call POST "/roles/$TRADER_ROLE_ID/assignments/add" "{\"assignments\":[{\"id\":\"$TRADERS_GRP_ID\",\"type\":\"group\"}]}" > /dev/null
    thunder_api_call POST "/roles/$CHA_ROLE_ID/assignments/add" "{\"assignments\":[{\"id\":\"$CHA_GRP_ID\",\"type\":\"group\"}]}" > /dev/null
    
    # Create Users
    U123_ID=$(create_user "Private_User" "$ABCD_TRADERS_OU_ID" "user123" "user123@nsw.dev" "1234")
    U456_ID=$(create_user "Private_User" "$ABCD_TRADERS_OU_ID" "user456" "user456@nsw.dev" "1234")
    U789_ID=$(create_user "Private_User" "$ABCD_TRADERS_OU_ID" "user789" "user789@nsw.dev" "1234")
    NPQS_U_ID=$(create_user "Government_User" "$NPQS_OU_ID" "npqs_user" "npqs@nsw.dev" "1234")
    FCAU_U_ID=$(create_user "Government_User" "$FCAU_OU_ID" "fcau_user" "fcau@nsw.dev" "1234")
    IRD_U_ID=$(create_user "Government_User" "$IRD_OU_ID" "ird_user" "ird@nsw.dev" "1234")
    
    # Add to groups
    thunder_api_call POST "/groups/$TRADERS_GRP_ID/members/add" "{\"members\":[{\"id\":\"$U123_ID\",\"type\":\"user\"},{\"id\":\"$U789_ID\",\"type\":\"user\"}]}" > /dev/null
    thunder_api_call POST "/groups/$CHA_GRP_ID/members/add" "{\"members\":[{\"id\":\"$U123_ID\",\"type\":\"user\"},{\"id\":\"$U456_ID\",\"type\":\"user\"}]}" > /dev/null
    
    # --- FIX CORS for Applications ---
    
    update_app_cors() {
        local client_id="$1"
        local origin="$2"
        
        # Get app ID
        local APP_JSON=$(thunder_api_call GET "/applications" | sed 's/},{/}\n{/g' | grep "\"client_id\":\"$client_id\"")
        local APP_ID=$(echo "$APP_JSON" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
        
        if [ -z "$APP_ID" ]; then echo "App $client_id not found"; return; fi
        
        # Get full details
        APP_JSON=$(thunder_api_call GET "/applications/$APP_ID" | head -n -1)
        
        # Append allowed_origins to the config of the FIRST inbound_auth_config
        # NOTE: Thunder/Asgardeo uses 'allowed_origins' inside the oauth2 config object.
        # We will inject it using sed or similar if we can, but let's try a simpler approach by overwriting.
        
        # For simplicity, we know the structure from my previous view.
        # We will just PUT a corrected version.
    }
    
    # Direct update of applications with CORS and Redirect URIs
    update_app() {
        local name="$1"
        local client_id="$2"
        local host="$3"
        local user_type="$4"
        
        read -r -d '' PAYLOAD <<JSON || true
    {
        "name": "$name",
        "client_id": "$client_id",
        "is_registration_flow_enabled": false,
        "template": "react",
        "inbound_auth_config": [
            {
                "type": "oauth2",
                "config": {
                    "client_id": "$client_id",
                    "redirect_uris": ["https://$host", "https://$host/", "https://$host/login/callback", "https://$host/dashboard", "http://$host", "http://$host/", "http://$host/login/callback", "http://$host/dashboard"],
                    "allowed_origins": ["https://$host"],
                    "grant_types": ["authorization_code", "refresh_token"],
                    "response_types": ["code"],
                    "token_endpoint_auth_method": "none",
                    "pkce_required": true,
                    "public_client": true,
                    "token": {
                        "access_token": { "validity_period": 3600, "user_attributes": ["email","groups","roles","username","ouHandle","ouId","ouName"] },
                        "id_token": { "validity_period": 3600 }
                    },
                    "scopes": ["openid", "profile", "email", "group", "role"]
                }
            }
        ],
        "allowed_user_types": ["$user_type", "Customer"]
    }
    JSON
    
        # Find ID to PUT
        local APP_ID=$(thunder_api_call GET "/applications" | sed 's/},{/}\n{/g' | grep "\"client_id\":\"$client_id\"" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
        if [ -n "$APP_ID" ]; then
            thunder_api_call PUT "/applications/$APP_ID" "$PAYLOAD" > /dev/null
        else
            thunder_api_call POST "/applications" "$PAYLOAD" > /dev/null
        fi
    }
    
    # --- DYNAMIC MULTI-ENVIRONMENT REGISTRATION ---
    
    register_apps() {
        local env_name="$1"     # "dev" or "staging"
        local env_prefix="$2"   # "dev-" or "staging-"
        local cluster_domain="{{ .Values.global.clusterDomain }}"
        local namespace="{{ .Release.Namespace }}"

        echo "Registering apps for environment: $env_name"

        # 1. Trader App
        local trader_client_id="TRADER_PORTAL_APP"
        if [ "$env_name" == "staging" ]; then trader_client_id="nsw-staging-client"; fi
        
        # We include both hyphenated and potential non-hyphenated (legacy) routes for resilience
        local trader_host="${env_prefix}trader-app-${namespace}.${cluster_domain}"
        local legacy_trader_host="trader-app-${namespace}.${cluster_domain}"
        
        update_app "${env_name^}TraderApp" "$trader_client_id" "$trader_host" "Private_User"

        # 2. OGA Portal Apps
        for agency in NPQS FCAU IRD; do
            local agency_lower=$(echo "$agency" | tr '[:upper:]' '[:lower:]')
            local oga_client_id="OGA_PORTAL_APP_${agency}"
            if [ "$env_name" == "staging" ]; then oga_client_id="OGA_PORTAL_APP_${agency}_STAGING"; fi
            
            # Host pattern based on current deployment strategy
            local oga_host="${env_prefix}oga-${agency_lower}-${namespace}.${cluster_domain}"
            if [ "$env_name" == "staging" ]; then
                # Staging OGA routes currently omit the namespace in some configurations
                oga_host="${env_prefix}oga-${agency_lower}.${cluster_domain}"
            fi
            
            update_app "${env_name^}${agency}PortalApp" "$oga_client_id" "$oga_host" "Government_User"
        done
    }

    # Register both environments into the shared IDP
    register_apps "dev" "dev-"
    register_apps "staging" "staging-"
    
    echo "Seeding and multi-environment OIDC configuration completed."
    
    echo "Seeding and CORS fix completed."
---
apiVersion: batch/v1
kind: Job
metadata:
  name: idp-thunder-seed-job
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      name: idp-thunder-seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seeder
          image: registry.developers.crunchydata.com/crunchydata/crunchy-postgres:ubi8-15.4-0
          command: ["/bin/sh", "/scripts/seed.sh"]
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: idp-thunder-seed-cm
            defaultMode: 0755
