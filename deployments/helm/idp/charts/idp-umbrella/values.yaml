thunder:
  # configuration for official ghcr.io/asgardeo/helm-charts/thunder
  configuration:
    server:
      port: 8090
      publicUrl: "https://idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk"
      httpOnly: true
      
    # The crypto settings belong under 'security' in the Asgardeo config model
    security:
      crypto:
        publicKeyPath: "/opt/thunder/repository/certs/signing.cert"
        privateKeyPath: "/opt/thunder/repository/certs/signing.key"
      
    gateClient:
      hostname: "idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk"
      port: 443
      scheme: "https"
      
      allowedOrigins:
        - "https://dev-trader-app-national-single-window-platform.apps.sovecloud1.akaza.lk"
        - "https://dev-oga-fcau-national-single-window-platform.apps.sovecloud1.akaza.lk"
        - "https://dev-oga-ird-national-single-window-platform.apps.sovecloud1.akaza.lk"
        - "https://dev-oga-npqs-national-single-window-platform.apps.sovecloud1.akaza.lk"
  
    database:
      config:
        type: "postgres"
        host: "nsw-db"
        port: 5432
        name: "configdb"
        username: "postgres"
        sslmode: "disable"
        passwordRef:
          name: "nsw-db-credentials"
          key: "password"
      runtime:
        type: "postgres"
        host: "nsw-db"
        port: 5432
        name: "runtimedb"
        username: "postgres"
        sslmode: "disable"
        passwordRef:
          name: "nsw-db-credentials"
          key: "password"
      user:
        type: "postgres"
        host: "nsw-db"
        port: 5432
        name: "userdb"
        username: "postgres"
        sslmode: "disable"
        passwordRef:
          name: "nsw-db-credentials"
          key: "password"
  
  deployment:
    replicaCount: 1
    container:
      port: 8090
      extraEnv:
        - name: THUNDER_SKIP_SECURITY
          value: "true"
  
  # Resources for the main deployment container
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi # Shared IDP needs enough RAM
    requests:
      cpu: 100m
      memory: 512Mi
  
  global:
    imagePullSecrets:
      - name: ghcr-secret
      
    securityContext:
      runAsNonRoot: true
      # runAsUser: 1001570000 # Omit for OpenShift compliance
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false # Required for some internal Thunder operations
  
    volumeMounts:
      - name: thunder-signing-keys-volume
        mountPath: "/opt/thunder/repository/certs"
        readOnly: true
  
    volumes:
      - name: thunder-signing-keys-volume
        secret:
          secretName: "thunder-signing-keys"
          defaultMode: 0444
  
  # Mandatory: Fixes the "failed quota" for the setup job
  setup:
    enabled: true
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 10m
        memory: 64Mi
  
  # Mandatory: Fixes the "failed quota" for init containers (init-db, etc)
  initResources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 64Mi
  
  serviceAccount:
    create: true
    name: "thunder-service-account"
  
  ingress:
    enabled: true
    className: "" 
    hostname: "idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk"
    customAnnotations:
      route.openshift.io/termination: edge
