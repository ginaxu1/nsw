# Default values for idp-umbrella.
global:
  clusterDomain: ""
  namespace: ""

fullnameOverride: ""

podSecurityContext:
  runAsNonRoot: true
  fsGroup: null

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

seeder:
  image:
    repository: ghcr.io/opennsw/idp
    pullPolicy: IfNotPresent
    tag: 0.0.0-replace-me
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

seeding:
  adminPassword: ""
  sampleUserPassword: ""
  m2mClientSecret: ""
  # Explicit redirect domains for each SPA application.
  # Each value should be just the hostname (without https://).
  appDomains:
    traderApp: ""    # e.g. trader-app-nsw-dev.apps.sovecloud1.akaza.lk
    ogaNpqs: ""      # e.g. oga-npqs-app-nsw-dev.apps.sovecloud1.akaza.lk
    ogaFcau: ""      # e.g. oga-fcau-app-nsw-dev.apps.sovecloud1.akaza.lk
    ogaIrd: ""       # e.g. oga-ird-app-nsw-dev.apps.sovecloud1.akaza.lk

thunder:
  enabled: true
  replicaCount: 1

  ingress:
    enabled: true
    hostname: "" # To be provided by GitOps env config
    tls:
      enabled: true
      secretName: "idp-tls-cert"

  configuration:
    server:
      publicUrl: "" # To be provided by GitOps env config
    gateClient:
      hostname: "idp-thunder-service"
      port: 8080
      scheme: "http"
      path: "/gate/"

  consoleClient:
    path: "/console/"


  deployment:
    securityContext:
      readOnlyRootFilesystem: false  # Required for bootstrap setup-job to run binaries
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 256Mi

  setup:
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi


    database:
      config:
        host: "nsw-db"
        port: 5432
        name: "idp_db"
        user: "postgres"
        passwordRef:
          name: "nsw-db-credentials"
          key: "password"
      runtime:
        host: "nsw-db"
        port: 5432
        name: "idp_runtime_db"
        user: "postgres"
        passwordRef:
          name: "nsw-db-credentials"
          key: "password"
      user:
        host: "nsw-db"
        port: 5432
        name: "idp_user_db"
        user: "postgres"
        passwordRef:
          name: "nsw-db-credentials"
          key: "password"

  cors:
    allowedOrigins: []
