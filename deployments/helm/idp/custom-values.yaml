# configuration for official ghcr.io/asgardeo/helm-charts/thunder
configuration:
  server:
    port: 8090
    publicUrl: "https://idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk"
    httpOnly: true
    
  # The crypto settings belong under 'security' in the Asgardeo config model
  security:
    crypto:
      publicKeyPath: "/opt/thunder/repository/resources/security/signing.cert"
      privateKeyPath: "/opt/thunder/repository/resources/security/signing.key"
    
  gateClient:
    hostname: "idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk"
    port: 443
    scheme: "https"
    
  cors:
    allowedOrigins:
      - "https://trader-app-national-single-window-platform.apps.sovecloud1.akaza.lk"
      - "https://oga-fcau-national-single-window-platform.apps.sovecloud1.akaza.lk"
      - "https://oga-ird-national-single-window-platform.apps.sovecloud1.akaza.lk"
      - "https://oga-npqs-national-single-window-platform.apps.sovecloud1.akaza.lk"

  database:
    config:
      type: "postgres"
      host: "nsw-db"
      port: 5432
      name: "configdb"
      username: "postgres"
      sslmode: "disable"
      passwordRef:
        name: "nsw-db-credentials"
        key: "password"
    runtime:
      type: "postgres"
      host: "nsw-db"
      port: 5432
      name: "runtimedb"
      username: "postgres"
      sslmode: "disable"
      passwordRef:
        name: "nsw-db-credentials"
        key: "password"
    user:
      type: "postgres"
      host: "nsw-db"
      port: 5432
      name: "userdb"
      username: "postgres"
      sslmode: "disable"
      passwordRef:
        name: "nsw-db-credentials"
        key: "password"

deployment:
  replicaCount: 1
  container:
    port: 8090
    extraEnv:
      - name: THUNDER_SKIP_SECURITY
        value: "true"
      - name: HOME
        value: "/tmp"
    securityContext:
      runAsNonRoot: true
      enableRunAsUser: false
      enableRunAsGroup: false
      enableFsGroup: false
      readOnlyRootFilesystem: false
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
  securityContext:
    runAsNonRoot: true
    enableRunAsUser: false
    enableRunAsGroup: false
    enableFsGroup: false
    readOnlyRootFilesystem: false
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL

global:
  imagePullSecrets:
    - name: ghcr-secret
    
  securityContext:
    runAsNonRoot: true
    enableRunAsUser: false
    enableRunAsGroup: false
    enableFsGroup: false
    readOnlyRootFilesystem: false
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL

  volumeMounts:
    - name: thunder-signing-keys-volume
      mountPath: "/opt/thunder/repository/resources/security/signing.cert"
      subPath: "signing.cert"
      readOnly: true
    - name: thunder-signing-keys-volume
      mountPath: "/opt/thunder/repository/resources/security/signing.key"
      subPath: "signing.key"
      readOnly: true
    - name: thunder-signing-keys-volume
      mountPath: "/opt/thunder/repository/resources/security/crypto.key"
      subPath: "crypto.key"
      readOnly: true

  volumes:
    - name: thunder-signing-keys-volume
      secret:
        secretName: "thunder-signing-keys"
        defaultMode: 0444

# Mandatory: Fixes the "failed quota" for the setup job
setup:
  enabled: true
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 10m
      memory: 64Mi
  env:
    - name: THUNDER_ADMIN_USERNAME
      value: "admin"
    - name: THUNDER_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: idp-admin-secrets
          key: admin-password
    - name: THUNDER_SAMPLE_USER_PASSWORD
      valueFrom:
        secretKeyRef:
          name: idp-admin-secrets
          key: sample-user-password
    - name: DB_CONFIG_PASSWORD
      valueFrom:
        secretKeyRef:
          name: nsw-db-credentials
          key: password
    - name: DB_RUNTIME_PASSWORD
      valueFrom:
        secretKeyRef:
          name: nsw-db-credentials
          key: password
    - name: DB_USER_PASSWORD
      valueFrom:
        secretKeyRef:
          name: nsw-db-credentials
          key: password

# Mandatory: Fixes the "failed quota" for init containers (init-db, etc)
initResources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

serviceAccount:
  create: true
  name: "thunder-service-account"


ingress:
  enabled: true
  className: "" 
  hostname: "idp-thunder-national-single-window-platform.apps.sovecloud1.akaza.lk"
  customAnnotations:
    route.openshift.io/termination: edge