apiVersion: kustomize.config.k8s.io/v1beta1
namespace: national-single-window-platform
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

helmCharts:
  - name: idp-umbrella
    releaseName: idp-thunder
    namespace: national-single-window-platform
    includeCRDs: false
    valuesFile: values-dev.yaml

configMapGenerator:
  - name: idp-thunder-bootstrap-scripts
    files:
      - charts/idp-umbrella/files/01-default-resources.sh
      - charts/idp-umbrella/files/02-sample-resources.sh

patches:
  - target:
      kind: Service
      name: idp-thunder-service
    patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: idp-thunder-service
      spec:
        ports:
          - name: http
            port: 8090
            targetPort: 8080

  - target:
      kind: Deployment
      name: idp-thunder-deployment
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: idp-thunder-deployment
      spec:
        template:
          spec:
            securityContext: null
            containers:
              - name: thunder
                securityContext: null
                workingDir: /opt/thunder
                ports:
                  - containerPort: 8080
                    name: http
                  - containerPort: 8081
                    name: console
                volumeMounts:
                  - name: thunder-signing-keys
                    mountPath: /opt/thunder/repository/certs/signing.key
                    subPath: signing.key
                  - name: thunder-signing-keys
                    mountPath: /opt/thunder/repository/certs/crypto.key
                    subPath: crypto.key
                  - name: thunder-signing-keys
                    mountPath: /opt/thunder/repository/certs/signing.cert
                    subPath: signing.cert
            volumes:
              - name: thunder-signing-keys
                secret:
                  secretName: thunder-signing-keys
                  defaultMode: 420

  - target:
      kind: Job
      name: idp-thunder-setup
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: idp-thunder-setup
      spec:
        template:
          spec:
            securityContext: null
            containers:
              - name: setup
                securityContext: null
                volumeMounts:
                  - name: thunder-signing-keys
                    mountPath: /opt/thunder/repository/certs/signing.key
                    subPath: signing.key
                  - name: thunder-signing-keys
                    mountPath: /opt/thunder/repository/certs/crypto.key
                    subPath: crypto.key
                  - name: thunder-signing-keys
                    mountPath: /opt/thunder/repository/certs/signing.cert
                    subPath: signing.cert
            volumes:
              - name: thunder-signing-keys
                secret:
                  secretName: thunder-signing-keys
                  defaultMode: 420
              - name: idp-thunder-config-map 
                configMap:
                  name: idp-thunder-bootstrap-scripts