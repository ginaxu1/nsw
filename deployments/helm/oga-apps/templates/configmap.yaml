apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oga-multi-frontend.fullname" . }}-nginx-configs
  labels:
    {{- include "oga-multi-frontend.labels" . | nindent 4 }}
data:
  {{- range $key, $agency := .Values.agencies }}
  nginx-{{ $key }}.conf: |
    server {
      listen {{ $agency.containerPort }};
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      # Security headers
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;

      # Gzip compression
      gzip on;
      gzip_vary on;
      gzip_proxied any;
      gzip_min_length 256;
      gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

      # SPA fallback
      location / {
        try_files $uri $uri/ /index.html;
      }

      # Proxy to backend to avoid CORS and SSL/TLS issues
      location /api/ {
        proxy_pass http://oga-{{ $key }}-backend:80/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      # runtime-env.js and index.html must never be cached
      location = /runtime-env.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      }

      location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      }

      # Hashed static assets — cache aggressively
      location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      }
    }
  {{- end }}
