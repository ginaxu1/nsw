volumes:
  postgres-data:

networks:
  temporal-network:
    driver: bridge
    name: temporal-network

services:
  postgresql:
    image: postgres:${POSTGRESQL_VERSION:-16-alpine}
    container_name: temporal-postgresql
    ports:
      # Use *BIND_HOST vars to restrict exposure in production (e.g. 127.0.0.1)
      - "${TEMPORAL_DB_BIND_HOST:-0.0.0.0}:${TEMPORAL_DB_PORT:-55435}:5432"
    environment:
      POSTGRES_USER: ${TEMPORAL_DB_USERNAME:-temporal}
      POSTGRES_PASSWORD: ${TEMPORAL_DB_PASSWORD:-temporal}
    networks:
      - temporal-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEMPORAL_DB_USERNAME:-temporal}"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.28.3}
    container_name: temporal-admin-tools
    restart: on-failure:6
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${TEMPORAL_DB_USERNAME:-temporal}
      POSTGRES_PWD: ${TEMPORAL_DB_PASSWORD:-temporal}
      POSTGRES_SEEDS: postgresql
      # Used by our setup script (kept separate from POSTGRES_PWD for clarity)
      SQL_PASSWORD: ${TEMPORAL_DB_PASSWORD:-temporal}
      # Optional database names (kept in sync with scripts/setup-postgres.sh defaults)
      TEMPORAL_DB_NAME: ${TEMPORAL_DB_NAME:-temporal}
      TEMPORAL_VISIBILITY_DB_NAME: ${TEMPORAL_VISIBILITY_DB_NAME:-temporal_visibility}
    networks:
      - temporal-network
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh"]
    command: /scripts/setup-postgres.sh

  temporal:
    image: temporalio/server:${TEMPORAL_VERSION:-1.28.3}
    container_name: temporal
    depends_on:
      temporal-admin-tools:
        condition: service_completed_successfully
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${TEMPORAL_DB_USERNAME:-temporal}
      POSTGRES_PWD: ${TEMPORAL_DB_PASSWORD:-temporal}
      POSTGRES_SEEDS: postgresql
      BIND_ON_IP: 0.0.0.0
      # Dynamic config is mounted under /etc/temporal/config/dynamicconfig
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/${TEMPORAL_DYNAMIC_CONFIG_FILE:-development-sql.yaml}
    networks:
      - temporal-network
    ports:
      - "${TEMPORAL_BIND_HOST:-0.0.0.0}:${TEMPORAL_PORT:-7233}:7233"
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 7233"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 60

  temporal-create-namespace:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.28.3}
    container_name: temporal-create-namespace
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      DEFAULT_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_NAMESPACE_RETENTION_DAYS: ${TEMPORAL_NAMESPACE_RETENTION_DAYS:-3}
    networks:
      - temporal-network
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION:-2.48.0}
    container_name: temporal-ui
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: ${TEMPORAL_UI_CORS_ORIGINS:-http://localhost:3000}
    networks:
      - temporal-network
    ports:
      - "${TEMPORAL_UI_BIND_HOST:-0.0.0.0}:${TEMPORAL_UI_PORT:-8233}:8080"
